<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI 대화 지식정리 최종본</title>
<style>
:root {
  --bg: #0f1117;
  --card: #1a1d27;
  --card-hover: #222633;
  --border: #2a2e3d;
  --text: #e4e6eb;
  --text-dim: #8b8fa3;
  --accent: #6c8aff;
  --accent2: #a78bfa;
  --green: #34d399;
  --orange: #fb923c;
  --red: #f87171;
  --yellow: #fbbf24;
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.6;
  min-height: 100vh;
}

/* Header */
.header {
  background: linear-gradient(135deg, #1e2235 0%, #151825 100%);
  border-bottom: 1px solid var(--border);
  padding: 24px 0;
  position: sticky;
  top: 0;
  z-index: 100;
  backdrop-filter: blur(12px);
}
.header-inner {
  max-width: 1200px;
  margin: 0 auto;
  padding: 0 24px;
}
.header h1 {
  font-size: 22px;
  font-weight: 700;
  margin-bottom: 4px;
}
.header .subtitle {
  color: var(--text-dim);
  font-size: 13px;
}
.stats-row {
  display: flex;
  gap: 16px;
  margin-top: 12px;
  flex-wrap: wrap;
}
.stat-chip {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 6px 14px;
  font-size: 13px;
  color: var(--text-dim);
}
.stat-chip b { color: var(--accent); }

/* Search */
.search-bar {
  margin-top: 14px;
  position: relative;
}
.search-bar input {
  width: 100%;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 10px 16px 10px 40px;
  color: var(--text);
  font-size: 14px;
  outline: none;
  transition: border-color 0.2s;
}
.search-bar input:focus { border-color: var(--accent); }
.search-bar input::placeholder { color: var(--text-dim); }
.search-bar svg {
  position: absolute;
  left: 12px;
  top: 50%;
  transform: translateY(-50%);
  color: var(--text-dim);
}

/* Layout */
.container {
  max-width: 1200px;
  margin: 0 auto;
  padding: 20px 24px 60px;
  display: flex;
  gap: 24px;
}

/* Sidebar */
.sidebar {
  width: 280px;
  flex-shrink: 0;
  position: sticky;
  top: 140px;
  max-height: calc(100vh - 160px);
  overflow-y: auto;
  scrollbar-width: thin;
  scrollbar-color: var(--border) transparent;
}
.sidebar::-webkit-scrollbar { width: 4px; }
.sidebar::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

.nav-cat {
  margin-bottom: 4px;
}
.nav-cat-btn {
  width: 100%;
  background: none;
  border: none;
  text-align: left;
  padding: 8px 12px;
  color: var(--text);
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  border-radius: 6px;
  transition: background 0.15s;
  display: flex;
  align-items: center;
  gap: 8px;
}
.nav-cat-btn:hover { background: var(--card); }
.nav-cat-btn .cat-icon { font-size: 16px; }
.nav-cat-btn .count { color: var(--text-dim); font-weight: 400; margin-left: auto; font-size: 11px; }

.nav-topics {
  display: none;
  padding-left: 20px;
}
.nav-topics.open { display: block; }
.nav-topic {
  display: block;
  padding: 5px 12px;
  color: var(--text-dim);
  font-size: 12px;
  text-decoration: none;
  border-radius: 4px;
  cursor: pointer;
  transition: all 0.15s;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.nav-topic:hover { color: var(--text); background: var(--card); }
.nav-topic.active { color: var(--accent); background: rgba(108,138,255,0.1); }

/* Main content */
.main { flex: 1; min-width: 0; }

.category-section {
  margin-bottom: 32px;
}
.cat-header {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 16px 20px;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 12px;
  margin-bottom: 12px;
  cursor: pointer;
  transition: background 0.15s;
}
.cat-header:hover { background: var(--card-hover); }
.cat-header .icon { font-size: 24px; }
.cat-header h2 { font-size: 17px; font-weight: 700; flex:1; }
.cat-header .badge {
  background: rgba(108,138,255,0.15);
  color: var(--accent);
  font-size: 12px;
  padding: 3px 10px;
  border-radius: 12px;
  font-weight: 600;
}
.cat-header .chevron {
  color: var(--text-dim);
  transition: transform 0.2s;
  font-size: 18px;
}
.cat-header.open .chevron { transform: rotate(180deg); }

.cat-body { display: none; }
.cat-body.open { display: block; }

/* Topic card */
.topic-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 10px;
  margin-bottom: 8px;
  overflow: hidden;
  transition: border-color 0.2s;
}
.topic-card:hover { border-color: #3a3f55; }
.topic-title {
  padding: 14px 18px;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 10px;
  font-size: 15px;
  font-weight: 600;
  transition: background 0.15s;
}
.topic-title:hover { background: var(--card-hover); }
.topic-title .t-chevron {
  margin-left: auto;
  color: var(--text-dim);
  transition: transform 0.2s;
  font-size: 14px;
}
.topic-title.open .t-chevron { transform: rotate(180deg); }
.topic-content {
  display: none;
  padding: 0 18px 18px;
}
.topic-content.open { display: block; }

/* Sections inside topic */
.section-block { margin-bottom: 16px; }
.section-label {
  font-size: 12px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  color: var(--accent);
  margin-bottom: 8px;
  padding-bottom: 4px;
  border-bottom: 1px solid var(--border);
}
.section-label.insight { color: var(--green); }
.section-label.issue { color: var(--orange); }

.section-text {
  font-size: 14px;
  color: var(--text);
  line-height: 1.7;
}
.section-text p { margin-bottom: 8px; }
.section-text strong { color: #fff; }
.section-text ol, .section-text ul {
  padding-left: 18px;
  margin-bottom: 8px;
}
.section-text li { margin-bottom: 6px; font-size: 13.5px; }
.section-text code {
  background: rgba(108,138,255,0.12);
  color: var(--accent2);
  padding: 1px 5px;
  border-radius: 3px;
  font-size: 12.5px;
}

/* Search highlight */
mark {
  background: rgba(251,191,36,0.3);
  color: var(--yellow);
  border-radius: 2px;
  padding: 0 1px;
}

.no-results {
  text-align: center;
  padding: 60px 20px;
  color: var(--text-dim);
  font-size: 15px;
}

/* Responsive */
@media (max-width: 900px) {
  .container { flex-direction: column; }
  .sidebar { width: 100%; position: static; max-height: none; display: none; }
  .header h1 { font-size: 18px; }
}

/* Scroll */
html { scroll-behavior: smooth; }
.main::-webkit-scrollbar { width: 6px; }
.main::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
</style>
</head>
<body>

<div class="header">
  <div class="header-inner">
    <h1>AI 대화 지식정리 최종본</h1>
    <div class="subtitle">ChatGPT 795 + Gemini 4,133 = 4,928개 대화 분석 | 3라운드 x 10팀 = 30 에이전트 정리</div>
    <div class="stats-row">
      <div class="stat-chip"><b>9</b> 카테고리</div>
      <div class="stat-chip"><b>45</b> 주제</div>
      <div class="stat-chip"><b>4,928</b> 대화</div>
      <div class="stat-chip"><b>30</b> 에이전트</div>
    </div>
    <div class="search-bar">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
      <input type="text" id="searchInput" placeholder="검색 (예: 골프, 엑셀, 대출, Power Automate...)">
    </div>
  </div>
</div>

<div class="container">
  <nav class="sidebar" id="sidebar"></nav>
  <div class="main" id="main"></div>
</div>

<script>
const DATA = [{"name": "1. APG 업무 (무역/자동차부품) (2,611건)", "topics": [{"name": "APG Garrett (241건)", "sections": [{"title": "핵심 요약", "content": ["AP Global과 Garrett Motion(인도) 간 무역 업무 전반을 다룬 대화. Power Automate 기반 이메일 자동화/번역/OCR, Garrett의 일방적 Debit Note(DN) 공제 분쟁, 미지급 대금 추적, 인도 관세 원산지 규정 변경 대응이 핵심이다. DN 분쟁에서 AI에게 메일/엑셀 기반 데이터 정리를 반복 요구하며, AI 할루시네이션(금액·품번·인보이스 번호 오류)을 직접 발견·수정하는 과정이 특징적이다."]}, {"title": "주요 내용 Top 5", "content": ["1. **Power Automate 이메일 자동 번역 + 승인 워크플로우** — 아웃룩 특정 메일 감지 → ChatGPT/Copilot API 번역 → Approvals 검토 → 승인 시 자동 전송", "2. **Garrett DN 분쟁 종합 정리** — DN 번호별 금액·인보이스·품번·불량 사유·HBL 번호·사진 증빙·보험사 대응 상태를 표로 정리 (AI 금액 오류 반복 수정 포함)", "3. **인도 관세 원산지 규정(2025년 개정)** — \"Certificate of Origin\" → \"Proof of Origin\"으로 변경, Form I·제조 내역·비용표 등 수출자 준비 서류 안내", "4. **PAD + 알PDF OCR 자동화** — AI Builder(유료) 대신 무료 알PDF OCR을 Power Automate Desktop에서 연동하는 방법", "5. **Garrett 발주서 자동 처리 전체 흐름** — txt 발주서 수신 → xls 변환 → 셀 복사/붙여넣기 → PDF 변환 → 담당자별 메일 자동 발송"]}, {"title": "실용 인사이트", "content": ["- Power Automate \"Approvals\"로 번역 검토 후 전송 가능 (완전 자동 전송의 오류 방지)", "- PAD 트리거를 바탕화면 바로가기로 만들어 원클릭 실행 가능", "- DN 분쟁 시 필수 정리: 메일 근거 일자, 담당자, 사진 증빙 여부, 보험사 클레임 상태, HBL 번호", "- AI에게 엑셀/메일 기반 정리를 맡길 때 원본 대조 검증 필수 (금액·품번·인보이스 번호 오류 빈번)", "- 인도 FTA 원산지 규정(2025.03.18): \"증명서\" → \"증명\"으로 완화, 다양한 형태의 입증 자료 허용", "- Garrett 분쟁 핵심: 사전 승인 없는 DN 발행, 증빙 없는 폐기, AIG 보험 클레임 지연"]}]}, {"name": "APG KSPG (647건)", "sections": [{"title": "핵심 요약", "content": ["AP Global의 무역 업무 전반을 다룬 대화군. KSPG(독일 Rheinmetall 계열) 및 해외 거래처와의 수출입 실무가 중심이다. 자동차 부품(EGR Cooler, YTA Garnish 등)의 품질 이슈(누수, 융착 불량, 브레이징 불량) 대응, 선적 서류(인보이스/패킹리스트) 생성, Power Automate 업무 자동화가 주요 내용이다. 인보이스 PDF 자동 생성과 Outlook 연동에 상당한 시행착오가 있었으며, 영문 비즈니스 메일 작성 요청이 빈번하다."]}, {"title": "주요 내용 Top 5", "content": ["1. **KP9965 프라이머 시험 결과 메일** - 3M vs KCC 프라이머 박리 강도 시험 결과를 HSL에 공유하는 영문 메일. KCC 제품은 고온다습 조건에서 박리 발생, 건조조건 개선(70도C 8시간) 시 회복", "2. **EGR Cooler 품질 클레임 대응** - KSPG에서 348개 불량 보고(브래킷 위치 불량 327개, 클립 느슨함 1개, 찌그러짐 18개). 거부 인보이스 및 Debit Note 처리 프로세스 정리", "3. **인보이스 PDF 자동 생성** - 엑셀 기반 인보이스 생성. KSPG FCL 건은 2160개씩 분리하여 인보이스 4개 + 패킹리스트 생성", "4. **Power Automate 화물인수증 자동 저장** - \"화물인수증\" 제목 메일 수신 시 첨부파일을 업체별 폴더에 자동 저장. 트리거 설정, 매개변수 오류, 업체명 자동 인식 등에서 반복 시행착오", "5. **HKMC 융착 불량 긴급 대응** - 공장에서 융착 깊이 불량 발견, LOT 특정 및 선별 비용 최소화를 위한 긴급 영문 메일 작성"]}, {"title": "실용 인사이트", "content": ["- **선적 일정 관리**: DOC Cut-off → ETD → ETA 순서. 인보이스 번호는 AP+날짜+순번 형식(예: AP20250322-40_FCL)", "- **품질 클레임**: 8D Report 작성 → NG 분석 → 반품 처리 → Debit Note 발행. 품질 문제 내용을 반드시 명확히 기재", "- **인보이스 생성**: 기존 엑셀 양식(.xls) 기반으로 작업해야 PDF 레이아웃이 일치함 (코드 직접 생성 시 양식 불일치)", "- **Power Automate**: \"새 이메일 도착 V3\" 트리거 → 고급 옵션에서 제목 필터/첨부파일 조건 설정, ToRecipients에 본인 이메일 입력으로 최초 수신만 필터링", "- **영문 메일 패턴**: 품질 불량, 포장 적재(stackable) 확인, 선적 문의 등 무역 실무 메일이 반복 활용됨"]}]}, {"name": "APG Elkamet (507건)", "sections": [{"title": "핵심 요약", "content": ["AP Global에서 해외 자동차 부품업체(Elkamet 등)를 한국 OEM에 영업하는 과정 전반을 AI로 지원받은 대화들이다. CATIA+Python 자동 설계, 원산지 관리(FTA/비특혜), 물류/포워딩, 대금 지급 분쟁, 품질 이슈(치수/싱크마크/금형), 비즈니스 영어 이메일 작성이 주요 축이며, 보험/AI로봇 등 업무 외 생활 질문도 일부 포함되어 있다."]}, {"title": "주요 내용 Top 5", "content": ["1. **CATIA + Python 자동 설계**: pycatia/win32com.client로 CSV/Excel 치수를 읽어 3D 모델 자동 생성. 유전 알고리즘+FEA/CFD 시뮬레이션 연동으로 최적 형상 설계까지 확장 가능.", "2. **원산지 관리(FTA vs 비특혜)**: 미국 CBP 비특혜 원산지 검증 강화 동향. 동일 물품의 특혜 원산지(멕시코)와 비특혜 원산지(중국) 판정이 다를 수 있어 사전검증 필요.", "3. **대금 지급 분쟁**: \"60 days from shipment\"는 지급 완료 기한이지 준비 시작일이 아님. Custom duty reversal 관련 부당 공제 항의, 지급 지연 시 선적 지연 책임 및 지연이자 경고.", "4. **품질 치수 변경**: 측정 포인트 102번 R-profile 산포 문제로 소치수 기준 변경 요청. 3D 데이터(9.95) vs 2D 도면(9.9+/-0.1) 불일치에 대해 10+/-0.1로 도면 변경 제안.", "5. **물류/포장 협의**: 팔레트 다단적재 조건, FCA 조건에서 리스크/비용은 수하인 부담이므로 서면 확인 필수, 항공/해상 혼합 운송 방안."]}, {"title": "실용 인사이트", "content": ["- pycatia 또는 win32com.client로 Python에서 CATIA 반복 도면 작업 자동화 가능", "- AI 최적 설계는 유전 알고리즘 + FEA/CFD + CATIA API 조합으로 구현", "- GR(Goods Receipt): ERP 입고 등록 완료 후 대금 지급 절차 시작 (SAP 기준)", "- ASN(Advanced Shipping Notice): 공급업체가 출하 전 시스템에 등록하는 사전출하통지서", "- FCA 조건에서 팔레트 적재 시 리스크/비용은 수하인 부담 -> 사전 서면 확인 필수", "- 비특혜 원산지 검증 강화 추세로 동일 물품의 원산지 변경 시 재검증 필요", "- Custom duty reversal: 반품, 과다납부, 사후 FTA 적용 시 발생하는 관세 환급/취소 처리", "- WO Mic 앱으로 스마트폰을 PC 마이크로 활용 가능 (Windows+H 음성 입력과 조합)", "- 보험 암 진단비 면책기간: 일반적으로 가입 후 90~180일"]}, {"title": "[참고] 분류 이슈", "content": ["보험 면책기간, AI 로봇 추천(Loona/Figure 01), MCP 서버 개념 등 APG 업무와 무관한 생활/기술 질문이 일부 혼재."]}]}, {"name": "APG 현대 (279건)", "sections": [{"title": "핵심 요약", "content": ["AP Global에서 현대자동차그룹(HKMC) 관련 무역 실무를 다룬 대화. 자동차 부품 개발(러기지 디바이더, 유리, 브레이크 등), 해외 협력사(Brembo, Pierburg, Techniplas)와의 영문 비즈니스 커뮤니케이션, 품질 이슈 대응(IMDS 등록, 불량 대책서), 물류·선적 관리(CIF, 체화료), ESG 조달 정책, 단가 인하 협상 등이 핵심이다."]}, {"title": "주요 내용 Top 5", "content": ["1. **러기지 공간 분할 디바이더 컨셉 개발** — 현대차 신기술 협력사 설명용 PPT 작성. 모듈형 디바이더, X/Y축 슬라이딩 메커니즘, 벨크로 고정 등 컨셉 제안", "2. **IMDS 원재료 등록 거부 대응** — Pierburg 거부 사유(상품명 대신 화학적 명칭 요구) 분석, 현대특수강/한국NOF 향 대응 방안 정리", "3. **긴급 항공선적 조율** — HKMC 발주 누락에 따른 라인 중단 위기 시 5,000개 긴급 항공선적 요청 메일 작성. 소량 우선 선적 + 잔량 후속으로 비용 최소화", "4. **CIF 무료 보관기간(Free Time) 분쟁** — 14일 무료 기간이 5일로 잘못 적용된 DO 재발행 요청 메일 작성", "5. **APW/MPW 및 리드타임 회신** — Techniplas 일일 최대 생산량(품번별 3,060개) 기반, COVID 이후 리드타임 4주 복귀 가능성 회신"]}, {"title": "실용 인사이트", "content": ["- 영문 비즈니스 메일은 단순 번역이 아닌 **격식체 구조**(Subject line → 인사 → 구조화 본문 → 클로징)로 작성", "- IMDS 등록 시 원재료명은 반드시 **화학적 명칭** 기재 (상품명 불가)", "- CIF 조건 선적 시 **Free Time** 확인 필수 — 잘못 적용되면 과도한 체화료 발생", "- 자동차 제작공법 영어 표현: Stamping, Injection Molding, Die Casting, Forging, Extrusion 등", "- 해외 화학제품 수입 시 한국 **화학물질관리법** 검토 및 공식 유통업체 확인 필요", "- 긴급 물류는 **소량 NXD 우선 + 잔량 후속 선적** 전략으로 비용 최소화", "- HKMC 구매본부 세미나에서 ESG, 물류/통관(FTA), 단가 인하 등 정기 공유"]}]}, {"name": "APG 한일튜브 (35건)", "sections": [{"title": "핵심 요약", "content": ["AP Global과 한일튜브 간 자동차 부품(오일피드파이프 등) 공급 관련 대화. 원소재 공급처 변경(4M 승인), 품질 불량 클레임 대응, 비용 정산 분쟁, 인도 수출 계약 조항 검토(GST/TDS), 견적서·목표단가 협상, 선적 서류 작성 등 무역 품질관리 실무를 다룬다."]}, {"title": "주요 내용 Top 5", "content": ["1. **원소재 공급처 이원화(4M 승인)** — 세아FS 단일 소싱에서 TI QHD 추가를 위한 4M 변경 승인 절차 및 필요 서류 안내", "2. **인도 계약서 조항 검토(GST/TDS)** — 서비스 수출 시 GST 제로세율 적용, 한-인도 DTAA에 따른 원천징수세 조항별 검토", "3. **품질 불량 클레임/비용 분쟁 대응** — DN(Debit Note) 관련 품질 문제 해명 요청 및 잘못 공제된 비용 환급 요구 메일 작성", "4. **R1324 프로젝트 목표단가 협상** — 견적 대비 목표단가(Body: $141,750→$98,500, Inner Lens-D: $121,950→$68,500) 제안", "5. **선적 패킹리스트/파렛트 적재 계산** — 박스 사이즈(500x500x200mm) 기반 파렛트(70x85cm) 적재 높이 계산, LCL 선적 서류 작성"]}, {"title": "실용 인사이트", "content": ["- **4M 변경(Man, Machine, Material, Method)** 시 고객사 승인 절차 필수, 신고서/샘플 제출 사전 준비", "- 인도 수출 시 **BIS 인증** 및 **ISIR** 확보 필수", "- 한-인도 DTAA 활용으로 **TDS(원천징수세)** 경감 가능 — 별도 법률 검토 권장", "- 불량 클레임 대응 시 **공정 재현 테스트 결과**를 근거로 책임 소재 명확히", "- 비용 분쟁에서 대금 미지급 시 제품 발송 영향을 명시하면 협상 레버리지 확보"]}]}, {"name": "APG 코렌스 (59건)", "sections": [{"title": "핵심 요약", "content": ["AP Global과 코렌스 간 자동차 부품 무역 실무 대화. 쿨러 장착 홀 수직도 불량, 볼트 조립 NG 등 품질 클레임 대응이 핵심이다. HS 코드 분류, 엑셀 INDIRECT/INDEX/MATCH 활용 월별 시트 동적 참조, 대금 독촉, 영문 비즈니스 메일 작성이 주요 업무. 파일 분류 자동화, 카카오 메일 복구 등 IT 질문도 일부 포함."]}, {"title": "주요 내용 Top 5", "content": ["1. **HS 코드 분류** — 자동차 부품 8708.xx(차체/부분품), 엔진 부품 8409.xx 체계. 세부 항목(8708.10 완충기, 8708.30 제동장치 등) 확인", "2. **엑셀 INDIRECT 동적 수식** — 월별 시트에서 DM열/K열 자동 참조. 병합 셀 환경에서 `MATCH(COLUMN(), COLUMN(범위), 1)` 패턴 활용, ROW(A4)로 행 번호 동적 생성", "3. **볼트 조립 NG 클린로트 대응** — 선별완료품 TAG 부착, 출하이력(1/12 2,160개, 1/14 2,060개) 정리, 8D 리포트 작성 및 영문 메일 발송", "4. **대금 지급 독촉** — AP20250822-40까지 미수금 회수 요청. 선적 4건 17,280개 취소 경고 포함 영문 비즈니스 메시지", "5. **희토류 수출제한 영향** — 중국산 희토류 규제가 공급 품목에 미치는 영향 조사, 협력사 회신 결과 영문 보고"]}, {"title": "실용 인사이트", "content": ["- INDIRECT + INDEX/MATCH 조합으로 여러 월별 시트 데이터를 동적 참조 가능. 병합 셀에서는 MATCH로 열 위치를 찾고, SUBSTITUTE로 \"월\" 제거 후 시트명 생성", "- ROW(A4) 형태로 행 번호를 동적 생성하면 수식 복사 시 자동 확장", "- HS 코드는 8708(차체/부분품), 8409(엔진 부품)이 기본. 정확한 분류는 관세청 확인 필수", "- 클레임 대응 시 클린로트 출하이력 + TAG 사진 + 8D 리포트를 세트로 준비하는 것이 표준 절차", "- 대금 독촉은 Invoice 번호와 마감일을 명시하고, 선적 취소 등 결과를 언급하는 것이 효과적", "- 파일 정리 자동화 시 기존 파일명이 양호하면 유지하고, \"제목 없음\" 등 불량 파일명만 선별 수정하는 판단 로직 필요"]}, {"title": "[참고] 분류 이슈", "content": ["카카오 메일 복구, 컴퓨터 속도 개선, 파일 분류 자동화 등은 IT/일반 주제에 가까우나, 코렌스 업무 맥락에서 발생하여 이 카테고리에 유지"]}]}, {"name": "APG IDIS (81건)", "sections": [{"title": "핵심 요약", "content": ["AP Global의 IDIS(인도 협력사) 관련 실무 대화. 자동차 부품 금형 제조·품질 개선, 영한/한영 비즈니스 이메일 번역, 무역 서류·선적 일정 관리가 핵심이다. 금형 싱크마크 개선, 그레이닝(엠보) 공정, T3 트라이얼 일정 조율, 금형 수정 방안(용접 vs 신규 제작) 비교 등 구체적 의사결정 과정이 기록되어 있다."]}, {"title": "주요 내용 Top 5", "content": ["1. **금형 싱크마크 개선** — 중량 485g 사출 시 캘린더·가장자리 리브 부위에 싱크마크 잔존. IDIS 측 제안: 1.8mm 라운드보스 두께 증가, 일자리브 축소, 캘린더마크 위치 이동.", "2. **금형 수정 비용·일정 비교** — 1안(용접수정): 크랙·얼룩 리스크로 불가 / 2안(상메인코어 신규제작 + 하코어 가공): D+28일, 380만원 / 리브 R적용 수정: D+10~12일, 580만원 / 리브 추가(상인코어 EDM): D+5일, 300만원", "3. **T3 트라이얼·선적 일정 조율** — MTT Korea 엠보(그레이닝) 진행, 상·하 금형 분리 입고 가능 여부 확인, engineering change 상측 금형 반영 7일 소요, 8월 초 선적 도착 목표", "4. **비즈니스 영문 이메일 작성** — 금형 수정내역(EDM 가공, 취출블록 제작, 리브 추가 등) 영어 번역, RESRG Automotive 신규 프로젝트 미팅 조율, KCC 견적 요청, ESG 평가 안내 메일 등", "5. **한국 정치인 탐색** — 55세 이하, 감세+지출축소+이공계 관심 인물 → 이준석(개혁신당, 1985년생)이 최적합: 19개 부처→13개 통폐합, 규제기준국가제, KAIST 이공계 우대 공약"]}, {"title": "실용 인사이트", "content": ["- **금형 용어 영어 표현**: 하인코어(Lower insert core), 방전가공(EDM processing), 취출블록(Ejector block), 하원판(Lower fixed plate), 상원판(Upper fixed plate), 리브(Rib), 구배각도(Draft angle), 파팅(Parting line)", "- **금형 수정 의사결정 원칙**: 용접수정은 크랙·얼룩 리스크 → 비용이 더 들더라도 신규 코어 제작이 안전", "- **CIF 조건 포장 책임**: 수출자에게 있음. CFS가 아닌 경우 공급업체 공장 또는 현지 물류창고에서 포장", "- **스팸메일 식별**: \"Dear Fund Beneficiary\"로 시작하는 지급금 안내는 전형적 사기 이메일"]}]}, {"name": "APG 대금정산 (256건)", "sections": [{"title": "핵심 요약", "content": ["AP Global(APG)의 대인도 무역 업무 전반. 인도 KSPG Automotive India와의 대금 정산(미결제 인보이스 추적, BL 기준 60일 지급 조건), 물류비 비교(DHL vs 타업체), FTA 원산지 증명(CEPA), BIS 인증, 포장 불량 대응, 영문 비즈니스 이메일 작성을 다룬다. TVSTT(인도 물류거점) 보험료 산정과 Delivery cost 협의도 포함."]}, {"title": "주요 내용 Top 5", "content": ["1. **대금 지연 독촉 영문 메일** - KSPG 미결제 인보이스 추적, BL 기준 60일 조건 명시. 격식 있는 표현(\"sincerely hope\", \"would greatly appreciate\") 활용", "2. **DHL vs 타업체 물류 견적 비교** - LCL/FCL별 Origin/Destination Charges, THC, DO, CFS 항목별 매칭표 제작. 환율(USD 1,471원/INR 17.21원) 적용, 선사 고정요금과 포워더 비용 구분", "3. **CEPA 원산지 증빙(Form I, RVC)** - 인도 관세청 규정 변경으로 Certificate of Origin 대신 Proof of Origin 필요. RVC(역내부가가치율) 계산표, BOM 작성 가이드, 제출 서류 목록 정리", "4. **BIS 인증 제도** - FMCS(외국 제조업체 인증) vs 국내 제조업체 인증 차이, 40개 제조업체 인증서 필요 여부 확인", "5. **포장 불량 대응 및 보험 클레임** - DHL 운송 중 화물 손상(SELB80724), CIF 조건 하 책임소재 판단, 사진 확보 및 클레임 절차"]}, {"title": "실용 인사이트", "content": ["- 엑셀 날짜 수식: `=TEXT(D1-5, \"MM월 DD일\")` (5일 전), `=TEXT(E59, \"YYYY-\") & TEXT(ISOWEEKNUM(E59), \"00\")` (주차 표기)", "- W/M(Weight or Measurement): 중량(톤) 또는 부피(CBM) 중 큰 쪽 기준 과금", "- CFS(Container Freight Station): LCL 화물의 혼재/분리 작업장 (De-Stuffing, Sorting, Segregation 포함)", "- THC(Terminal Handling Charge): 항구 하역 요금. DO(Delivery Order): 화물 인수 문서 비용", "- RVC 증빙 시 전체 원가 대신 항목별 비율(%)만 제공하는 전략 가능 (제조 원가는 기업비밀)", "- CEPA 비혜택 제외품: 역내산이어도 양허대상에서 제외된 HS 코드는 특혜관세 불가", "- Export Clearance 필수 서류: Commercial Invoice, Packing List, 수출신고필증, HS Code 분류", "- Flash-off time: 접착제/프라이머 도포 후 용매 증발 대기 시간 (최소 3분)", "- TVSTT 주소: J. Matadee Free Trade Zone, Sriperumbudur Taluk, Tamil Nadu 602105, India", "- 비즈니스 영어 팁: \"fervently hope\"는 과한 표현, \"sincerely hope\" 권장"]}]}, {"name": "APG 통관선적 (195건)", "sections": [{"title": "핵심 요약", "content": ["AP Global(APGI) 무역 실무 전반을 다루는 대화군. 금형/자동차부품 수출입이 핵심이며, 영문 비즈니스 이메일 작성, 선적 일정 조율, 통관 절차, 보험 클레임, 가격 협상 등 실무 커뮤니케이션이 대부분이다. 주요 거래처는 IJL(인도), Techniplas(중국 타이저우), Elkamet(독일), HSL, 현대/평화 등이며, 인도 나바샤바 항 물류, OBL 처리, 영세율 세금계산서 발행 등 구체적 무역 프로세스가 상세히 기록되어 있다. 비즈니스 커뮤니케이션 이론 시험 문제 풀이(맥과이어 모델, 칼 포퍼 토론, 설득의 3요소 등)도 포함."]}, {"title": "주요 내용 Top 5", "content": ["1. **영문 이메일 작성** — 한국어 메일을 공손하고 전문적인 영어로 번역하는 요청이 가장 빈번. 긴급 요청, 가격 협상, 일정 확인, 불량 대응 등 상황별 템플릿 제공. 주어를 \"I\"로 통일(We 대신)", "2. **선적/물류 일정 관리** — 금형 포장 사이즈/무게 기반 컨테이너(20FT/40FT) 산정, LCL vs FCL 비교, 나바샤바 항 ETA 후 공장 입고까지 소요시간(통관 1~2일 + 내륙운송 1~6일)", "3. **통관 실무 절차** — OBL 발행 후 원산지증명서/인보이스/패킹리스트와 함께 수입자에게 송부. 수출면장은 에이스관세법인을 통해 처리", "4. **영세율 세금계산서/구매확인서** — 선적 직후 수출신고필증 기준 100% 금액으로 발행, 환율은 선적일 외환은행 달러매도율 적용", "5. **비즈니스 커뮤니케이션 이론** — 맥과이어 입출력 모델, 칼 포퍼 토론 형식, 설득의 3요소(감성/지성/이성), 프레젠테이션 보디랭귀지 등 시험 문제 풀이"]}, {"title": "실용 인사이트", "content": ["- 이메일 톤: 주어 \"I\" 통일, 긴급 상황에서도 \"kindly\", \"sincerely\"로 공손함 유지", "- 금형 선적 리스크: 엠보(그레이닝) 수정 4~5일 소요 가능. 일정이 틀어지면 선적 부킹 재진행이므로 여유 확보 필수", "- LCL vs FCL: LCL은 ETA가 빨라도 디콘솔·개별 통관·별도 트럭 배차로 최종 입고가 FCL보다 늦음", "- 클레임 처리: 불량 발견 → 생산일자 확인 → 폐기 증빙 확보 → 마이너스 인보이스 또는 대체 공급으로 보상 협의", "- 견적 시 한계 선제 고지: 크레인 용량(20톤) 초과 금형은 제작/시사출 불가 명시", "- 강재 인증서: 금형별 Core/Cavity Housing, Insert 등 부위별 인증서 수령 확인 필수"]}, {"title": "[참고] 분류 이슈", "content": ["위고비 요요 현상(건강/의료), 중국/인도 주식·BYD 투자(재무/투자), 유머 민사소장(개인/생활), 아웃룩 글꼴 변경(IT 트러블슈팅) 등 일부 혼입"]}]}, {"name": "APG 품질 (71건)", "sections": [{"title": "핵심 요약", "content": ["AP Global의 품질관리·무역 실무 전반을 다루는 대화. 포장 불량(팔레트 러너, 골판지 사양), 코팅 벗겨짐, 벤딩 NG, 스코어링 마크 등 다양한 품질 이슈 대응이 중심이다. 고객사(HSL, KSPG, TEL 등) 클레임 대응·대책서 작성, 25,643개 부적합 부품 폐기 결정, 무역 업무 인수인계 자료 정리 등 구체적 실무가 기록되어 있다."]}, {"title": "주요 내용 Top 5", "content": ["1. **포장 품질 클레임 대응** — 팔레트 러너 4면 차단으로 핸드파레트/BOPT 접근 불가(최소 2면 개방 필요), 골판지 박스 사양 미달로 제품 손상 → 포장 기준 재정립 필요", "2. **25,643개 부적합 부품 처리** — 고객사 현장 실사 요청 → 제조팀 방문 지시 및 폐기(Disposition) 처리. 라인마크·찌그러짐·녹 등 모든 결함 방지 대책 수립", "3. **품질 대책서(Countermeasure Report)** — HSL 대상, 특정 LOT(10/7 17:00~23:40) 불량 원인 설명용 LX3 대책서 작성", "4. **무역 업무 인수인계 자료** — 수출입 물류, 통관, 발주, 선적 일정, 품질비용 관리, BL 발송 주의사항, 원산지 증명서 등을 엑셀 한 시트에 종합 정리. 협력사별 물류(KSPG-나바샤바, 가레트-나바샤바, 터보에너지-첸나이, 명화-첸나이, 하이테크Arai-첸나이) 포함", "5. **TEL 품질 이슈 리스트 정리** — 품명·품번 별도 열 분리, 날짜 YYYY-MM-DD 통일, 필터링 용이한 엑셀 포맷으로 재구성"]}, {"title": "실용 인사이트", "content": ["- **품질 용어**: Scoring mark(긁힘 결함), Control Plan(관리계획서), MS Code(Material Standard 규격), IS Code(Indian Standards 인도 국가 표준)", "- **클레임 대응 원칙**: 고객사 인라인 조립공정보다 자사 공장 공정을 점검하는 것이 근본원인 파악에 효과적", "- **무역 서류 관리**: BL 발송 시 수신자 확인, DHL B/L은 16시까지 확인, 원산지 증명서 관세 확인 필수, HS코드 미등록 시 공급 불가", "- **엑셀 데이터 관리**: 품명·품번을 별도 열로 분리, 날짜를 YYYY-MM-DD로 통일해야 필터링·정렬 용이"]}]}, {"name": "APG 계약 (76건)", "sections": [{"title": "핵심 요약", "content": ["행복주택/공공임대 청약, 디딤돌대출, 전세자금대출 등 부동산 금융과 주거 관련 질문이 주축. 서초구 행복주택 입주를 목표로 전세자금 마련 전략, 기존 주담대 보유 상태에서 추가 대출 가능 여부, DSR 규제 및 예외를 구체적으로 탐색한다. 무역 계약서 번역, CBM 계산 등 업무 관련 내용도 일부 포함."]}, {"title": "주요 내용 Top 5", "content": ["1. **행복주택 vs 국민임대 vs 공공임대 vs 영구임대 비교** — 입주대상, 임대기간, 임대료 수준별 비교. 행복주택은 시세 60~80%, 기본 6~10년(최대 20년), 청년/신혼부부 대상", "2. **디딤돌대출 부적격 후 재신청** — 2주택 보유로 대출 중지 시, 주택 처분 후 등기 완료 시점부터 즉시 재신청 가능. \"기한의 이익 상실\"은 만기까지 상환 유예 권리의 소멸", "3. **주담대 보유 상태에서 전세대출** — 우리부동산론(부모님 집 담보) 보유 시에도 SGI/HUG 보증 기반 전세대출 가능. 행복주택 실거주자는 \"실수요자 예외\" 활용", "4. **전세자금대출 구조와 DSR** — 전세대출은 2년 단위 만기 연장(이자만 납부) 구조가 일반적. 정책형 전세대출은 DSR 예외 적용. 연봉 8천만 원 + 기존 대출 1.3억 상태에서 전세 2억 추가 가능", "5. **서초/강남/송파/강동 공공임대 계획** — 서초+송파 2,140가구 공공주택, LH 청년매입임대 726~984세대 예정. 신반포자이 행복주택 우선공급 정보"]}, {"title": "실용 인사이트", "content": ["- 전세자금대출은 DSR 예외 적용 대상이므로 주담대 보유자도 가능. 단, 은행별 심사 기준 상이", "- 디딤돌대출 부적격은 영구 제한이 아님 — 조건 해소(주택 처분 등) 후 즉시 재신청 가능", "- 행복주택은 분양이 아닌 임대이므로 대출 의무 없음. 신혼희망타운 분양형만 해당", "- SGI/HUG 보증 전세대출은 기존 주담대 보유자에게 가장 현실적 대안(보증비율 80~90%)", "- 부모님 집 담보 주담대는 본인 명의 대출로 간주 — \"실수요자 예외\" 증빙(행복주택 입주계약서 등) 준비 필수", "- 상호전환 임대는 초기 부담 낮고(보증금 3~7천만 원 + 월세), 전세대출은 초기 부담 높지만 월세 없이 이자만 납부", "- CBM 계산: cm 단위 3변 곱 / 1,000,000 (예: 110x110x90cm = 1.089 CBM)"]}, {"title": "[참고] 분류 이슈", "content": ["무역 계약서 법무팀 코멘트 번역, 회계/문서 자동화 구상, 투자/재테크 질문 등은 부동산과 직접 무관하나 같은 업무/재테크 맥락으로 묶여 있음"]}]}, {"name": "APG 발주 (76건)", "sections": [{"title": "핵심 요약", "content": ["AP Global(APG)의 글로벌 자동차 부품 무역 실무 전반을 다룬다. 발주서 메일 자동화, 엑셀 조건부 서식 기반 발주/입고 관리, 글로벌 Tier1/Tier2 업체 조사, 비즈니스 영문 이메일 작성, 인도 FTWZ 창고 VMI 운영이 핵심이다. 현대/기아향 부품 공급과 해외 거래처 커뮤니케이션 업무가 중심."]}, {"title": "주요 내용 Top 5", "content": ["1. **발주서 메일 자동화 파이프라인** — Gmail/Outlook API로 발주서 메일 자동 필터링 → 첨부파일 다운로드 → OCR/파싱 → 엑셀 정리 → 담당자 전달. Python + imaplib으로 구현 가능.", "2. **엑셀 조건부 서식 (발주량 vs 입고량 비교)** — 빨강(미달): `=AND(N4<>\"\", N$3>=INDEX($W$3:$AQ$3, COUNTA(W4:AQ4)), N4>SUM(W4:AQ4))`, 초록(완료): `=AND(N4<=SUM($W4:$AQ4), N4<>\"\")`. N열 기준 수식이 하위 행에 자동 적용.", "3. **글로벌 자동차 부품업체 조사** — Voss, Stoneridge, Lear, Macauto, Hutchinson, Toyota Gosei, Schaeffler, Gentex, Marquardt, 흑룡강TYW 등 주요 업체 엑셀 정리.", "4. **인도 FTWZ VMI 운영** — FTWZ(Free Trade and Warehousing Zone)는 인도 정부 지정 보세 무역/물류 특구. DAP 조건 전환 이유는 TEL 측 요구 + FTWZ 내 운송/통관은 승인된 Unit Holder(TVSTT)만 가능하기 때문. 보험은 Fire & Burglary(USD 1,029.32) + Marine Insurance 별도.", "5. **비즈니스 영문 이메일 작성** — \"Kindly\" 대신 \"Please\" 또는 \"We would appreciate\" 사용 권장. 발주 취소, 납기 변경, 견적 수정, BIS 인증 요청 등 상황별 템플릿 구비."]}, {"title": "실용 인사이트", "content": ["- 발주서 자동화: Gmail/Outlook API + Python OCR + 엑셀 연동으로 구현 가능", "- FTWZ 내 통관/운송은 정부 승인 Unit Holder만 가능 → TVSTT 필수", "- DAP 조건에서는 FTWZ 창고까지 운송 책임이 수출자(APG)에게 있음", "- \"Kindly\"는 일부 문화권에서 거부감 → 비즈니스 이메일에서는 \"Please\" 권장", "- 엑셀 활용: 발주/입고 관리, 협력업체 현황, 일별/주별/월별 업무 카테고리 정리"]}]}, {"name": "APG 원산지 (12건)", "sections": [{"title": "핵심 요약", "content": ["AP Global 무역 실무에서 발생하는 원산지 증명서(CO), HS Code, FTA 관련 질문과 해외 거래처 대상 비즈니스 영어 이메일 작성을 다룬다. 인도(CEPA), 아세안(FTA) 수출입 원산지 결정기준과 관세 감면 조건이 핵심이며, Garrett Motion 등 실제 거래처와의 영문 이메일 교정 요청이 다수 포함되어 있다."]}, {"title": "주요 내용 Top 5", "content": ["1. **원산지 증명서 \"Quadruplicate\"** — 4부 작성(원본+사본3부). 수입국 세관·수출자·수입자·운송사에 각각 제출하며, FTA별 작성 부수 요건이 다르므로 사전 확인 필수", "2. **HS Code 변경 리스크 (8409.99 vs 7307.92)** — 인도 수출 시 HS Code를 변경하면 원산지 결정기준(PSR) 충족 불능, FTA 특혜관세 상실, 세관 심사 리스크 발생", "3. **미국 추가관세 대응** — 미국산 원자재 20% 이상 포함 시 해당 비율만큼 관세 면제되는 예외조항 활용을 위해, 협력사에 원자재 비율 조사 요청 이메일 발송", "4. **Country of Cast 기재** — 플라스틱(PA66) 제품은 주조 공정이 아니므로 최종 제조국(South Korea)을 기재", "5. **비즈니스 영어 이메일 템플릿** — 미팅 일정 조율, 셧다운 플랜 회신, OTP/결제 확인 요청, CAD 데이터 요청 등 실무 상황별 영문 메일 작성"]}, {"title": "실용 인사이트", "content": ["- FTA별 원산지 증명서 작성 부수 요건이 다르므로 수출 전 반드시 확인할 것", "- HS Code 변경 시 원산지 결정기준(PSR)이 완전히 달라질 수 있어 사전 관세사 검토 필수", "- 미국 관세 예외조항 활용을 위해 협력사의 원자재 원산지 비율 데이터를 체계적으로 수집·관리해야 함", "- 비즈니스 영문 이메일은 공손한 표현(\"Could you kindly support\" 등) + 명확한 요청사항 명시가 핵심"]}]}, {"name": "영어번역 (76건)", "sections": [{"title": "핵심 요약", "content": ["자동차 부품 무역(APG-Elkamet-HSL-OEM) 관련 비즈니스 이메일 한영 번역이 대부분이다. 한국 공휴일 안내, 물류 일정 조율, 대금 지급 독촉, 품질 이슈, 원산지 서류(COO) 추적, 포장/운송 조건 협의 등이 핵심이다."]}, {"title": "주요 내용 Top 5", "content": ["1. **대금 지급 독촉 메일**: 미송금 건에 대한 강력 독촉. \"60 days from shipment = 지급 완료 기한\" 재확인, 지급 지연 시 선적 지연 책임 및 지연이자 적용 경고.", "2. **품질 치수 변경 요청**: 측정 포인트 102번 R-profile 산포 문제로 소치수 기준 변경, 3D vs 2D 불일치에 대한 도면 변경 제안.", "3. **물류 용어 정리**: GR(Goods Receipt, 입고 처리), ASN(Advanced Shipping Notice, 사전출하통지), HIT(OTTR 100% 시스템 자동 인식), COO(Certificate of Origin) 추적.", "4. **ESG 평가 보완 요청**: 테크니플라스 ESG 정규 평가 70점 미달에 대한 본사 보완 요청 전달. 양산 가능 최소 ESG 수준 70점 설정.", "5. **B3K5 품질 이슈 보고**: 유량 업데이트, 숏트샷/성형 밸런스(중량 기준 2g 이내), 싱크마크 개선(sink cut 적용), RPGN 문서 요청."]}, {"title": "실용 인사이트", "content": ["- 정중하면서 단호한 비즈니스 표현: \"Kindly note that...\", \"Please be advised that...\"", "- FCA 조건 하 팔레트 적재 등은 서면 확인(written confirmation) 필수", "- 생산 능력 회신: 주당 생산량 기준 월간 최대 공급량 산출, 재고 미보유 시 사전 발주 필수", "- 한국 2025년 주요 공휴일: 설날(1/28-30), 어린이날+석탄일(5/5), 추석(10/5-7), 개천절/한글날 연휴(10/3-9)", "- 대법원 판결문 열람: https://ecfs.scourt.go.kr 에서 사건번호/당사자명 검색 가능", "- PPAP 재제출: 설계 변경(stiffener pull tab 위치 등) 시 LHD/RHD 모두 re-PPAP 필요"]}, {"title": "[참고] 분류 이슈", "content": ["이재명 전과 기록 조사(정치/시사), 카메라 부품 조회, 성인 콘텐츠 추천 등 번역과 무관한 내용 포함."]}]}]}, {"name": "2. 부동산/세금/법률 (344건)", "topics": [{"name": "부동산 (288건)", "sections": [{"title": "핵심 요약", "content": ["교육체계 정리, 도시계획/부동산, 정치/경제/복지, 자산관리, 법률 상식 등 다양한 주제가 혼합되어 있다. 고등학교 교과과정 세분화(과학 10개·사회 9개 카테고리), 서울 2000만명 수용 도시 시뮬레이션, 글로벌 도시 비교, 기본소득 논쟁 등이 주요 내용이다."]}, {"title": "주요 내용 Top 5", "content": ["1. **고등학교 교과과정 세분화** — 과학 10개(역학, 전자기학, 열역학 등), 사회 9개(역사, 지리, 정치/법, 경제, 사회/문화, 윤리/철학, 심리, 교육, 국제관계) 카테고리로 대학원 수준까지 체계 정리", "2. **서울 2000만명 수용 시뮬레이션** — 16평 아파트, 일조권 4시간 보장 조건에서 필요 면적 계산. 30층 이상 건물로 일조권 확보는 동간 거리 제약으로 매우 어려움", "3. **글로벌 도시 인구/면적 비교** — 맨해튼(160만명, 59.1km2), 강남구(55.6만명, 39.5km2), 저지시티 등 주요 도시 데이터 비교", "4. **기본소득 논쟁** — 핀란드 실험(고용률 개선 미미), 알래스카 PFD(인플레 영향 제한적) 등 실제 사례 기반 분석. 노동의욕 저하, 골목상권 효과 미미 등 반론 정리", "5. **교육 재분배 모델** — 상위 5%가 월 1억원 교육비를 내면 7000만원이 95%에게 환원, 1명의 비용으로 700명이 양질의 교육을 받는 구조 제안"]}, {"title": "실용 인사이트", "content": ["- 고등학교 사회과목은 역사/지리/정치법/경제/사회문화/윤리철학 6개 축으로 세분화하면 체계적 학습 설계 가능", "- 서울에서 일조권 4시간 확보 + 30층 이상 아파트는 동간 거리 등 물리적 제약으로 현실적으로 매우 어려움", "- 북유럽 복지 국가에도 부의 편중이 존재하며(IKEA 캄프라드, 발렌베리 가문 등), 스웨덴은 최근 복지 축소 추세", "- 자산관리는 직접투자(부동산, 주식)와 간접투자(펀드, REITs, ETF)를 분산하는 것이 기본 원칙", "- 반려견 분실 후 사고 시, 소유자는 민법 제759조에 따라 민사 손해배상 + 과실치상/과실치사 형사 책임을 질 수 있음"]}, {"title": "[참고] 분류 이슈", "content": ["\"부동산\" 명칭이 실제 내용(교육체계, 정치경제, 법률 등)과 불일치. \"교육·사회·부동산\" 또는 하위 주제별 분리 권장."]}]}, {"name": "상속 증여 (15건)", "sections": [{"title": "핵심 요약", "content": ["부동산 상속세/증여세 절세 전략, 가족 간 저가 매매 세무 리스크, 동거주택 상속공제 요건을 탐색한 대화. 시세 10억 원 주택을 7억에 매수하는 시나리오, 20억 원 주택 상속 시 공제 계산, 유주택자 상속공제 제한, 자녀→부모 자금 지원 시 자금출처 조사 리스크 등을 다룬다. 순수 상속/증여 관련은 약 8~9건이며 나머지는 타 주제 혼입."]}, {"title": "주요 내용 Top 5", "content": ["1. **가족 간 저가 매매 세무 리스크** — 시세의 30% 또는 3억 원 이상 차이 시 증여세 부과. 매도자(부모)에게는 양도세 부당행위계산 부인 적용", "2. **상속세 기본 공제 구조** — 일괄공제 5억 + 배우자 공제 최소 5억 = 실질적으로 10억 원 이상 상속 시 세금 발생", "3. **동거주택 상속공제 요건** — 10년 이상 동거 + 1세대 1주택 + 상속인 무주택, 최대 6억 원 공제", "4. **유주택자 상속공제 제한** — 유주택자는 동거주택 상속공제 불가. 유일한 예외: 피상속인과 공동 1세대 1주택 소유", "5. **자녀→부모 자금 지원 리스크** — 성인 자녀→부모 증여 공제 한도 5,000만 원, 초과분 증여세 + 자금출처 조사 대상"]}, {"title": "실용 인사이트", "content": ["- 상속세 세율: 과세표준에 따라 10%~50% 누진세율", "- 가족 간 부동산 저가 매매: 양도세(매도자) + 증여세(매수자) 이중 과세 리스크", "- 동거주택 상속공제(최대 6억)는 요건이 까다로워 사전 설계 필수", "- 별도 주택 보유 시 동거주택 상속공제 부적격 가능성 매우 높음", "- AI 답변은 세무 참고용일 뿐, 절세 전략은 반드시 세무사/변호사 상담 필요"]}, {"title": "[참고] 분류 이슈", "content": ["독일어 번역, 캄보디아 여행/금 구매, 영포티 이미지 생성 등 무관 대화가 혼입되어 있음. 순수 상속/증여 관련은 약 8~9건."]}]}, {"name": "세금 절세 (41건)", "sections": [{"title": "핵심 요약", "content": ["개인 및 법인의 세금 절세 대화. 연말정산 소득공제 시뮬레이션, 법인 차량(11인승 승합차) 세제 혜택, 법인 저리 대출의 세무 처리, 법인 운영비 적자 분석 등이 핵심이다. 연봉 약 7,800만원 근로소득자의 실제 연말정산 데이터 기반 상세 분석이 포함되어 있다."]}, {"title": "주요 내용 Top 5", "content": ["1. **연말정산 소득공제 시뮬레이션** - 총급여 7,794만원, 기납부세액 421만원, 신용카드 등 6,000만원 사용. 부양가족 미반영 시 80~120만원 추가 납부, 반영 시 환급 전환 가능", "2. **법인 직원 대출 세무처리** - 법인이 임직원에게 저리 대출 가능하나, 연 4.6%(당좌대출이자율) 미만이면 차액이 근로소득으로 과세(인정이자)", "3. **법인 운영비 분석** - 3개월 기준 운영비 1.6억 + 물품대 16.4억 = 총 18억 지출, 매출 15억으로 3억 적자. 수출품 부가세 환급 1.5억 반영 시 순적자 1.5억", "4. **지급받은 총액 vs 소득금액 차이** - 총액은 세전 전체 금액, 소득금액은 필요경비(근로소득공제) 차감 후 과세 기준 금액", "5. **11인승 법인 승합차 세제 혜택** - 업무용 운행일지 작성 의무 면제, 부가세 환급 가능, 감가상각비 전액 비용처리 가능"]}, {"title": "실용 인사이트", "content": ["- **11인승 법인 승합차**: 업무용 차량 규제(운행일지 등) 면제, 부가세 환급 가능, 감가상각 한도 제한 없음", "- **법인 저리 대출**: 연 4.6% 기준 미달 이자 차액은 근로소득 간주 → 세금 부과", "- **수출품 부가세 환급**: 실제 입금까지 시차가 있으므로 운전자금 확보 필요", "- **연말정산 핵심 변수**: 부양가족(배우자, 자녀) 등록 여부가 환급/추가납부를 결정하는 가장 큰 변수", "- **장기주택저당차입금 이자공제**: 취득 당시 기준시가 6억원 이하, 무주택 또는 1주택 세대주 요건"]}, {"title": "[참고] 분류 이슈", "content": ["무역 실무(40피트 컨테이너, 구매확인서), 회식 액티비티 추천, 일본 카시트 법규, 정치 비판 등 세금과 무관한 내용이 다수 혼재. 무역 실무 → APG KSPG, 회식/카시트 → 기타 생활로 재분류 권장."]}]}, {"name": "법률 (8건)", "sections": [{"title": "핵심 요약", "content": ["일상에서 발생하는 법률 궁금증을 즉흥적으로 질문한 대화 모음. 정화조 철거 법규, 출산휴가 미부여 처벌, 리플 SEC 소송, 위조상품 판매 용어 등을 간략히 다룬다. 8건으로 적어 깊이보다는 빠른 정보 확인 목적이 강하다."]}, {"title": "주요 내용 Top 5", "content": ["1. **정화조 철거 법규** - 하수도법 시행규칙 제28조에 따라 내부 오수/찌꺼기 완전 제거 후 밀폐 필요. 미준수 시 100만원 이하 과태료", "2. **출산휴가 미부여 처벌** - 근로기준법 제74조, 총 90일 출산전후휴가 의무. 미부여 시 2년 이하 징역 또는 2천만원 이하 벌금", "3. **리플 vs SEC 소송** - 2020년 12월 SEC 소송 제기, XRP의 증권 해당 여부가 쟁점", "4. **위조상품 판매자 용어** - 법적: \"위조상품 유통업자\"/\"상표권 침해 사범\", 일상: \"짝퉁 판매자\", 은어: \"레플(레플리카) 업체\"", "5. **연말정산 장기주택저당차입금 공제** - 취득 당시 기준시가 6억원 이하, 무주택 또는 1주택 세대주 요건"]}, {"title": "실용 인사이트", "content": ["- **정화조 철거/폐쇄**: 반드시 관할 행정기관에 사전 신청 후 진행 (무단 철거 시 과태료)", "- **출산휴가 분쟁 대비**: 이메일/문자 등 공식 기록 확보 후 노동청 신고 가능", "- **위조상품 판매**: 상표법 위반으로 형사처벌 대상 (7년 이하 징역 또는 1억원 이하 벌금)"]}]}]}, {"name": "3. 투자/재테크 (171건)", "topics": [{"name": "투자 (171건)", "sections": [{"title": "핵심 요약", "content": ["주식/ETF, 휴머노이드 로봇 산업, 암호화폐 선물 레버리지, 국채/펀드, 배당주, 퇴직연금(IRP/DC형) 등 투자 전반을 다룬 대화. ETF 기초 개념부터 레버리지 25배 위험도, WLFI 코인 시세까지 폭넓게 포함한다."]}, {"title": "주요 내용 Top 5", "content": ["1. **휴머노이드 로봇 투자 분석** — 상장 기업 시총 순위(테슬라, 지멘스, 레인보우로보틱스 등), 유니트리 G1 부품 자체 개발 현황, 모터 부품 글로벌 납품사 순위", "2. **ETF 기초 + 배당주 30선** — ETF 개념(상장지수펀드, 실시간 매매, 분산투자), 대표 배당 기업(AT&T, 코카콜라, 엑손모빌 등)", "3. **워렌 버핏/캐시 우드 최근 동향** — 버핏: OXY, Constellation Brands, Domino's 매수 / 캐시 우드: Circle IPO, 테슬라 장기 베팅", "4. **퇴직연금(IRP/DC형) 활용** — IRP 연간 납입 한도 1,800만 원, 소득공제 최대 700만 원(연금저축 합산), KB DC형 디폴트옵션 해제 방법", "5. **선물 레버리지 25배 위험도** — 이론상 무한 수익 가능하나 4% 역방향 이동 시 원금 전액 청산"]}, {"title": "실용 인사이트", "content": ["- ETF 장점: 실시간 매매 + 분산투자 + 낮은 운용보수", "- 휴머노이드 로봇: 직접 상장사(테슬라, 유비텍, 두산로보틱스) 또는 AI/로봇 ETF 활용", "- IRP + 연금저축 합산 최대 700만 원 소득공제 → 연간 약 115만 원 세금 절감", "- 선물 레버리지 25배: 4% 역방향 시 원금 전액 청산 (고위험)", "- 국채 구매: 증권사 HTS/MTS, 은행 창구, 한국예탁결제원 채권유통시장", "- 펀드 환매: 개방형은 언제든 가능(2~3영업일), 폐쇄형/사모펀드는 만기 전 환매 불가 또는 제한"]}, {"title": "[참고] 분류 이슈", "content": ["개인 프로파일링(MBTI·외모·약물 추정), 위고비/성장호르몬(건강), 생일파티(일상), 채상병 사건(시사), 한강공원 물놀이(레저), 자영업 실업급여(법률) 등 무관 대화 혼입."]}]}]}, {"name": "4. 창업/사업아이디어 (35건)", "topics": [{"name": "창업아이디어 (35건)", "sections": [{"title": "핵심 요약", "content": ["다양한 사업 아이디어를 탐색·구체화하는 대화군. 소자본 창업(구매대행, 중고 리셀)부터 AI 교육 플랫폼(ClearView Edu), 자기계발 플랫폼(Level Up Human), 유아 체육 아카데미(Olympic Kids AI Lab), 모듈형 교정 깔창, PA66 체크밸브 제조까지 폭넓다. 사업계획서 PPT 작성 요청이 반복되며, 정부지원사업(예비창업패키지, 초기창업패키지) 활용 전략과 자금 조달 포트폴리오까지 포함."]}, {"title": "주요 내용 Top 5", "content": ["1. **소자본 최단기간 수익 사업** — 구매대행(마진 20~40%, 1~2달 흑자 전환), 중고 리셀, 스마트스토어 등 추천. 자금 회전이 빠른 디지털/유통 사업이 유리", "2. **모듈형 교정 깔창** — O/X다리·평발·아치·허리 교정용 3층 구조. 슬라이딩 홈 + 벨크로 이중 고정 방식. 금형비 1,500만~3,000만 원. 해외 사례: WearerTech CustomPro", "3. **PA66 체크밸브 제조 원가** — 10만개 기준 원재료비 PA66 약 $44,000~$54,000 + 판막비 별도. 초기 설비(금형 2캐비티 + 초음파 융착기 등) 총 1억 원 내외", "4. **AI 교육 플랫폼(ClearView Edu)** — 청정 교육 콘텐츠 큐레이션 + IP 수익화 플랫폼. 크리에이터 수익 배분, 성취도 레벨 시스템", "5. **정부 지원금 활용 전략** — 자부담 1억 + 정부지원 최대 1억(예비창업패키지) + 정책금융 1억 = 총 3억. 지분 희석 없는 Non-equity 자금 우선 확보 원칙"]}, {"title": "실용 인사이트", "content": ["- 창업 초기: 하드웨어/규제 리스크보다 디지털 콘텐츠 플랫폼이 저비용/고확장성", "- 제조업 진입 비용: 금형(2캐비티) 3,000만~5,000만 원, 초음파 융착기 1,500만~3,000만 원, 초기 설비 총 1억 원 내외", "- 모듈형 제품 설계: 땀/움직임 대응에 슬라이딩 홈 + 벨크로 조합 최적", "- 투자 현실: 매출 10억 기업 초기 1억 투자 시 지분 10~20%가 일반적", "- 성공 사례: 프레시지(밀키트)가 K-유니콘 사업 수혜로 100억 보증 확보 후 성장"]}, {"title": "[참고] 분류 이슈", "content": ["한살림 정치 성향(생활/시사), 쌍란 판별법(생활 상식), 하나은행 체크카드 발급(금융/생활) 등 소수 혼입"]}]}]}, {"name": "5. 건강/의료/운동 (872건)", "topics": [{"name": "건강 다이어트 (244건)", "sections": [{"title": "핵심 요약", "content": ["신장, 간, 전립선, 당뇨 등 주요 장기 건강을 과학적으로 탐구한 심도 깊은 질문 시리즈이다. 각 장기의 손상 원리와 회복 방법, 최적 약물 조합, 영양제 복용 스케줄, 전 세계 건강 식단까지 체계적으로 정리했다. 간헐적 단식, 혈액 정화, 콜레스테롤/간수치 해석, 다이어트 음식도 포함된다."]}, {"title": "주요 내용 Top 5", "content": ["1. **4대 장기 종합 약물 조합**: 아침(SGLT2 억제제 + 비타민D + 마그네슘 + CoQ10 + NAC), 점심(메트포르민 + GLP-1 작용제), 저녁(UDCA + 알파차단제). 발기부전 위험 약물(5a-환원효소 억제제) 제외.", "2. **간수치 해석**: ALT 210(정상 5배, 급성 간염 의심), GGT 155(알코올성 간손상/지방간), AST 90(간질환 가능), 총콜레스테롤 263(심혈관 위험 수준).", "3. **전 세계 건강 식단**: 한식(현미밥+삼치구이+시금치나물), 중식(삼선탕+청경채볶음), 일식(미소된장국+연어사시미), 동남아(포+똠얌꿍), 이탈리아(카프레제), 인도(달+차파티) 등 국가별 총정리.", "4. **영양제 안전성 검증**: 오메가-3(효과 논란, 심방세동 위험), 스피루리나(기능성 근거 부족), 밀크시슬(효과 미미한 메타분석 존재). 논란 적은 것: NAC, CoQ10, 비타민D+마그네슘.", "5. **간헐적 단식**: 16:8 또는 5:2 방법 권장. 단식 중 소금 6~8g/일 + 칼로리 없는 영양제(비타민B, CoQ10, 마그네슘, 아연, 셀레늄) 섭취. 혈액 완전 정화 시간은 과학적 근거 불충분."]}, {"title": "실용 인사이트", "content": ["- SGLT2 억제제 + GLP-1 작용제 병용: 서로 다른 기전으로 혈당 감소 시너지, HbA1c 추가 감소 입증", "- 신장 보호 우선순위: 혈압 조절(ACE억제제/ARB) > 혈당 관리 > 저염식 > 적정 단백질", "- 클로렐라/스피루리나: 건강인에게는 유익하나 신장 질환자는 인/칼륨 축적 위험", "- 사구체여과율 30ml/min 이하면 고칼륨 영양제 제한 필수", "- CRP 5.3 = 중등도 염증(만성 염증/감염 가능성), 10 이상이면 급성 염증", "- 마운자로(티제파타이드): GLP-1 + GIP 이중 수용체 작용, 위고비보다 큰 체중 감량 효과", "- SGLT2 억제제는 인슐린 분비와 무관하게 작용하므로 자체생산능력 감소 우려 없음", "- 당뇨 발생 원리: 1형(자가면역 베타세포 파괴), 2형(인슐린 저항성 + 분비 감소)", "- 단백뇨: 사구체 여과막 손상으로 알부민 등 단백질 누출, 세뇨관 재흡수 초과 시 발생", "- 저탄고단 배달음식: 포케(밥 대신 샐러드 베이스), 그릴드 치킨, 두부 스테이크 도시락"]}]}, {"name": "건강/운동/성장 (72건)", "sections": [{"title": "핵심 요약", "content": ["2020년생 여아(아림이)의 성장 문제(키 0.3퍼센타일)를 중심으로 한 건강 관리 대화. 성장호르몬 결핍 검사, 성장 촉진 운동/음식, 신약 동향을 다룬다. 본인 건강 관리(지방간, 콜레스테롤, 혈당 경계, 처방약), 실손보험 청구, 영양제 복용법도 주요 내용이며, 자궁근종 수술, 남성호르몬 최적화, 전립선암 등 가족/지인 건강 질문도 포함."]}, {"title": "주요 내용 Top 5", "content": ["1. **아이 성장 문제 종합 대응** - 의심 질환(성장호르몬 결핍, 갑상선기능저하, 터너증후군 등), GH 자극검사 기준(피크 < 10 ng/mL), 대학병원 검사만 건강보험 인정. 주 1회 제형(소그로야/Sogroya), 연골 형성 촉진제(Voxzogo) 등 최신 동향", "2. **건강 상태 관리(본인)** - 간기능 이상(AST/ALT/감마GTP 초과), 처방약(로수바미브정 10/5mg, 레가론 캅셀 140), 영양제(오메가3 rTG, 코엔자임Q10, 비타민D 2000IU). 질병분류: K760", "3. **실손보험 청구** - 소멸시효 3년, 영수증 보관 5년. 감기(보장 가능), 매복 사랑니(외과적 수술만), 건강검진(원칙 불가, 정밀검사 전환 시 가능). 처방 조제약 가능, 약국 직접 구매 일반약 불가", "4. **남성호르몬 최적화** - 고강도 하체 운동(스쿼트/데드리프트), 아연/마그네슘/비타민D/적절한 지방 섭취, 7-8시간 깊은 수면. 아나볼릭 스테로이드 중단 시 HPTA 셧다운으로 근육 소실 불가피", "5. **자궁근종 수술 비교** - 개복(통증 높음, 회복 느림) vs 복강경(보통, 구멍 1-3개) vs 하이푸(비침습). 에스트로겐 영향으로 생리 중 계속 성장"]}, {"title": "실용 인사이트", "content": ["- 예상 키 계산(여아): (아빠키 + 엄마키 - 13) / 2 (오차 +-5cm)", "- 성장판 자극 운동: 줄넘기, 철봉 매달리기, 코브라/브릿지 요가. 종목 추천: 농구, 배구, 수영, 체조", "- 채혈 후 회복 식단: 소고기/간(철분) + 비타민C(흡수 촉진) + 충분한 수분", "- 전립선암 뼈전이 5년 생존율 약 30%, 최신 치료(엔잘루타마이드, 아비라테론)로 연장 추세", "- 어린이 실내 체험: 리틀짐/마이짐(체조), 챔피언1250/바운스(클라이밍), 손연재 리프스튜디오(리듬체조)", "- 라이트세이버 펜싱: 2019년 프랑스 펜싱연맹 정식 승인", "- 음주와 혈관: 일시적 혈전 억제 효과 있으나 만성 음주는 혈관에 해로움"]}, {"title": "[참고] 분류 이슈", "content": ["원본 \"건강 운동\"에 물리학 교육(뉴턴 운동법칙 등), 3.1절 영어 표현, 정치 시사가 혼입되어 있었으나 건강 관련 내용만 반영함"]}]}, {"name": "건강 치과교정 (92건)", "sections": [{"title": "핵심 요약", "content": ["서초/강남 지역 병원 및 치과 선택에 관한 대화가 중심이다. 대장항문질환 전문병원 비교(기쁨병원 vs 대항병원), 서초/강남 치과 추천(장비 수준별), 어린이 부정교합 치료(AI/로봇 기술 포함), 페이스 마스크 부작용 등 건강/의료 정보를 다룬다."]}, {"title": "주요 내용 Top 5", "content": ["1. **기쁨병원 vs 대항병원 비교** - 대항병원은 보건복지부 지정 대장항문전문병원(4회 연속), 2024년 간호간병통합서비스 A등급. 기쁨병원은 치질 수술 분야에서 주목", "2. **서초/강남 치과 추천** - 장비 기준: 내인생치과(Ostell, 3D 네비게이션, 인비절라인), 서울스마일치과(3D CT), 연세우일치과(레이저/디지털스캐너) 등", "3. **어린이 부정교합 최신 기술** - AI 성장판 분석(뷰노 BoneAge), 3D 프린팅 교정장치, 디지털 구강스캐너 기반 맞춤 치료", "4. **부정교합 유명 병원 5선** - 서울대 치과병원, 연세대 치과병원 등 대학병원 중심 권위 있는 교정 전문 기관", "5. **페이스 마스크 부작용** - 피부 트러블/압박흔(가장 흔함), 치아 경사 및 동요 등"]}, {"title": "실용 인사이트", "content": ["- **대장항문질환**: 보건복지부 지정 전문병원 여부가 핵심 판단 기준", "- **의료기관 장비 확인**: 건강보험심사평가원 공개 데이터로 CT/MRI/초음파 보유 현황 조회 가능", "- **어린이 교정 시기**: AI 골연령 판독(뷰노메드 본에이지)으로 성장판 분석 → 최적 치료 시점 결정", "- **치과 선택 기준**: 홈페이지에서 \"성장판 검사 AI 분석\", \"뷰노메드 본에이지 도입\" 문구 확인", "- **페이스 마스크 관리**: 실리콘 패드, 거즈 교체, 보습제(비판텐) 도포로 피부 트러블 예방"]}, {"title": "[참고] 분류 이슈", "content": ["대학 과학 전공 분류(전자공학/전기공학/생물학/자연과학 카테고리화) 대화가 상당 부분 혼재. \"교육/학문 분류\" 주제로 분리 권장."]}]}, {"name": "건강 피부제모 (49건)", "sections": [{"title": "핵심 요약", "content": ["피부 관리(로션 원리, 레티놀, 모공, 피부탄력), 제모(왁싱 vs 레이저), 아기 피부 색소침착, 식품 영양 등이 주요 내용이다. 핵융합/핵분열, 후쿠시마 삼중수소 등 과학 질문과 세계 1위 품목 비교 등 잡학 질문도 혼재되어 있다."]}, {"title": "주요 내용 Top 5", "content": ["1. **로션의 피부 개선 3단계**: 보습(히알루론산, 글리세린) -> 보호막 형성(세라마이드, 오일) -> 재생 촉진(알로에 베라, 판테놀).", "2. **레티놀 사용법**: 세안 후 완전 건조 상태에서 완두콩 크기 적용. 초보자는 샌드위치 기법(보습제->레티놀->보습제) 권장. 레티날은 레티놀보다 한 단계 강력.", "3. **아기 이마 색소침착**: 멜라닌 분포 차이, 모세혈관 흔적, 마찰/압박 자국이 원인. 오타모반/카페오레 반점은 경계가 뚜렷하거나 진해지면 피부과 상담 필요.", "4. **색소침착 치료 시기**: 자연 소실형(몽고반점)은 관찰, 지속형(오타모반)은 어릴 때 레이저가 유리하나 마취 협조 문제로 유치원~초등 이후 권장.", "5. **핵융합 vs 핵분열**: 핵분열은 U-235 분열(고준위 폐기물 수십만 년), 핵융합은 D-T 결합(장기 폐기물 없음). 토카막/스텔러레이터/레이저 압축 기술, 상용화까지 수십 년 소요."]}, {"title": "실용 인사이트", "content": ["- 로션 핵심 성분: 히알루론산(수분 유지), 세라마이드(장벽 강화), 판테놀(재생 촉진)", "- 바셀린은 수분 공급이 아닌 기존 수분을 가두는 차단막 역할", "- 레티놀 입문 시 0.01~0.03% 저농도부터 시작, 과다 사용 시 피부 장벽 붕괴 위험", "- 모공 축소 화장품 대부분은 일시적 수렴 효과일 뿐 물리적 크기 변화 없음", "- 먹는 콜라겐은 위장에서 아미노산으로 분해되어 피부 콜라겐 직접 재생 근거 부족", "- 마데카솔은 종류별 성분이 다름: 케어(항생제), 복합(스테로이드) -> 용도에 맞게 선택", "- 한국 세계 1위 품목: 메모리 반도체, OLED TV 패널, LNG 운반선, 조선업", "- 후쿠시마 삼중수소: 베타선 방출, 피부 투과 불가, 체내 축적 시 내부피폭 우려"]}, {"title": "[참고] 분류 이슈", "content": ["핵융합/핵분열 등 과학 질문, 금형 각인 번역, 배달음식 추천, 국민건강보험 서류, 성인용품 질문 등 피부/건강과 무관한 내용 다수 혼재."]}]}, {"name": "건강 격투기 (52건)", "sections": [{"title": "핵심 요약", "content": ["복싱 콤비네이션 체계, 실전 격투기 비교(크라브 마가, 무에타이, BJJ, MMA 등), 룰별 유불리, 금지 기술, 시스테마(러시아 무술), 검도 vs 펜싱 실전성, 올림픽 종목 분류 등 격투기/스포츠 전반을 깊이 있게 탐구한 대화."]}, {"title": "주요 내용 Top 5", "content": ["1. **복싱 콤비네이션 전체 목록** — 숫자 체계(1=잽, 2=크로스, 3=리드훅, 4=리어훅, 5=리드어퍼컷, 6=리어어퍼컷, B=바디) 및 핵심 조합(1-2, 1-1-2, 1-2-3, 1-2-1-3 등)", "2. **실전 격투기 TOP 10** — 크라브 마가(실전 최강, 급소공격+무기방어), 무에타이(타격 최상급), 복싱(좁은 공간), BJJ(1:1 제압), MMA(종합)", "3. **룰 강도별 유불리** — UFC 룰: 그래플러 유리 / PRIDE 룰(사커킥·스탬핑 허용): 타격가+레슬러 유리 / 무제한: 급소 공격 허용 시 스포츠 기술 한계 노출", "4. **MMA 금지 기술 전체 목록** — 척추/목 관절기, 헤드 슬램, 눈 찌르기, 사타구니 공격, 후두부 가격, 손가락/발가락 관절기, 머리채 잡기 등", "5. **시스테마(러시아 무술)** — 4대 원리(호흡, 이완, 자세, 움직임) 중심, 정형화된 기술 없이 흐름 강조"]}, {"title": "실용 인사이트", "content": ["- 복싱 기본: 1-2(잽-크로스)가 모든 콤비네이션의 기초", "- 실전 자기방어: 크라브 마가가 단기간 습득에 가장 효과적 (급소 공격, 무기 방어 포함)", "- 무차별 상황에서 순수 주짓수의 약점: 가드 포지션에서 스탬핑/사커킥 위험", "- 각 격투기 스트레이트 펀치 목적 차이: 복싱(득점/거리조절), 킥복싱/무에타이(킥 셋업), 크라브 마가(팜 스트라이크 선호)", "- 시스테마: 정해진 폼 없이 원리 중심 훈련, 실전 적용력은 수련 기간에 비례"]}, {"title": "[참고] 분류 이슈", "content": ["파일 정리 자동화(Gemini API 연동, organize_desktop.py), 파일명/폴더 구조 설계, VR 스포츠 체험장, 아이 교육 체험 추천 등 무관 대화 혼입."]}]}, {"name": "건강/생활/철학 (363건)", "sections": [{"title": "핵심 요약", "content": ["세 가지 흐름으로 구성된다. **(1) AI 시대의 인간 존재 가치 탐구** — 의류 산업 AI 디자이너 역할론에서 \"AI가 모든 걸 대체하면 인간은 무엇을 할 것인가\"라는 근원적 질문까지 심층 토론. **(2) 생활/건강 정보** — 골프 연습장 추천, 지하창고 곰팡이, 서초구 복지, 행복주택, 식비, 손가락 증상 등. **(3) 지브리 스타일 이미지 생성** — 가족 사진을 지브리/카와이 스타일로 변환하는 요청 다수."]}, {"title": "주요 내용 Top 5", "content": ["1. **AI 시대 인간의 역할 연쇄 토론** — \"AI가 감성도 학습하면 인간만의 영역이 있는가?\" → \"감정도 패턴이라 모방 가능\" → **\"인간이 아무것도 할 수 없어도 살아야 하는 상황에서 존재의 가치를 어떻게 만들 것인가\"**라는 철학적 결론에 도달", "2. **미래 의류 산업 전체 루트** — 트렌드 분석 → 3D 디자인(CLO/Browzwear) → 원단 선정 → 패턴/재단 → 봉제 → QC → 마케팅 → 판매 전 과정 정리", "3. **골프 연습장 추천(서울 근교)** — 200m 이상 실외, 주말 야간(자정까지) 운영 조건 탐색. AI 답변 부정확성 사례 확인", "4. **전하/전류/건전지 원리** — 전자는 -에서 +로 이동하나 전류 방향은 +에서 -로 정의(관습적). 건전지 전위차 → 회로 → 필라멘트 저항 → 열/빛 순서", "5. **완전 자동화가 늦을 분야** — 비정형 환경(배관, 오래된 건물), 감성 노동(간병, 상담), 법조계/윤리 분야. 바이오 하이브리드 로봇 가능성도 논의"]}, {"title": "실용 인사이트", "content": ["- AI 시대에도 **\"왜 이 디자인인가\"의 스토리텔링**은 인간 몫이나, 결과물 품질이 동등하면 소비자는 AI를 선택할 가능성 높음", "- **존재의 가치는 능력이 아닌 관계와 의미 부여에서 나온다**는 결론", "- 지하창고 곰팡이 방지: **제습기 + 환기팬 + 방습제** 조합, 정기 환기 필수", "- 행복주택(강남 수서1단지) 18평 기준 시세 60~80% 수준 임대", "- 3인가구 월 식비: 절약형 60~80만 원, 보통 90~120만 원", "- 서초구 노인복지관 경로식당: 만 60세 이상, 회원 등록 필요", "- 손가락 비자발적 굽힘: 방아쇠수지(trigger finger), 척골신경 압박 등 가능", "[참고] 분류 이슈: 원본 JSON에서 \"건강 골프\"로 분류되었으나 AI 철학 토론·의류 산업 전망·생활 정보가 대량 포함되어 \"건강/생활/철학\"으로 제목 변경"]}]}]}, {"name": "6. 개발/자동화/AI도구 (2,788건)", "topics": [{"name": "AI도구 (1,291건)", "sections": [{"title": "핵심 요약", "content": ["AI 도구 활용법을 중심으로, 건설/제조업 AI 적용, 반도체/생화학 기술, 스마트 디바이스 연동, ChatGPT 대화 정리 방법 등 광범위한 주제를 포함한다. 건설현장(부지정지/터파기) AI/로봇 도입, 산업별 AI 전환 전략, GPT 에이전트 활용, PC 화면 AI 공유 등이 주요 내용."]}, {"title": "주요 내용 Top 5", "content": ["1. **건설현장 AI/로봇 기술 (부지정지, 터파기)** — 자율주행 굴착기/불도저, AI 드론 측량, 3D GPR 지반 분석. 현대제뉴인이 터파기 자동화 기술 개발 중. 머신 컨트롤(MC)/머신 가이던스(MG)로 굴착기 실시간 위치 제어.", "2. **반도체 미래 기술 + 생화학 반도체** — GAA 트랜지스터, High-NA EUV 등 차세대 공정. 단백질/DNA/박테리아 기반 반도체 연구(MIT, Harvard). 뇌는 20W로 약 1 ExaFLOP/W 연산, 동일 성능 반도체는 20MW+ 필요.", "3. **ChatGPT 대화 자동 정리 방법** — ChatGPT 자체 대화 분류 기능 없음. Google Takeout → Python으로 주제별 자동 분류 가능. Notion, OneNote 등 노트앱 연동 수동 정리 권장.", "4. **GPT 에이전트 모드 활용** — 이메일 자동 회신, 문서 작성, 파일 분석(PDF/Excel/Word). 시간/조건 기반 트리거 동작. Outlook 연동: Python + Microsoft Graph API.", "5. **산업별 AI 시대 대응 전략** — 덤프트럭 업체: AI 경로 최적화 → 자율주행 → 지능형 건설 물류 플랫폼으로 진화. 이불 판매업체: AI 맞춤형 수면 코치 → 스마트 이불(온도 자동조절) → 수면 생태계 종합 솔루션. Eight Sleep Pod Pro, SMARTDUVET 등 실제 제품 존재."]}, {"title": "실용 인사이트", "content": ["- Gmail 메일 제목 대량 추출: Google Takeout → .mbox → Python 파싱", "- 삼성 키보드 음성 입력: 스페이스바 옆 마이크 아이콘 또는 설정 > 일반관리 > 삼성 키보드 > 음성 입력", "- 스마트폰 GPT 제어: Tasker(Android) + GPT API 연동으로 간접 제어 가능", "- PC 화면 AI 공유: OBS Studio + WebRTC 실시간 스트리밍 → 클라우드 AI 분석", "- AI 지반 기술 검색 시 영문 키워드: \"AI geotechnical monitoring\", \"GPR AI analysis\""]}]}, {"name": "개발 업무자동화 (101건)", "sections": [{"title": "핵심 요약", "content": ["Power Automate for Desktop을 활용한 Outlook 이메일 자동화가 핵심. 메일 본문에서 날짜를 정규식으로 추출하여 새 메일에 자동 삽입하는 워크플로우 구축 과정이 단계별로 기록되어 있다. 파일 정리 자동화(Python + OpenAI API), 재고관리 시스템, 욕조 자동 물받기 IoT 장치 설계 등 다양한 자동화 프로젝트도 포함. AI 도구 비교(Monica AI, Gemini), OCR 솔루션 비교, 엑셀 수식 활용 등 실무 생산성 도구 질문도 다수."]}, {"title": "주요 내용 Top 5", "content": ["1. **Power Automate Outlook 자동화** — 메일 본문에서 날짜 추출(정규식: `(\\d{1,2})[월\\/]\\s*(\\d{1,2})[일]?`), 변수 설정, 포그라운드 창 활성화, UI 요소 캡처 등 단계별 트러블슈팅", "2. **파일 자동 분류(AI 기반)** — D드라이브 전체 파일을 업체별/소개자료/기술자료/프로젝트별로 분류. PowerShell 파일 수집 → Python + OpenAI API 내용 분석 → 자동 이동", "3. **욕조 자동 물받기 IoT** — 스마트 전동 밸브 + 서모스탯 믹싱 밸브 + 초음파 수위센서 + MCU 제어보드 구성. 초기 샘플 100개 개발비 약 500만~1,000만 원", "4. **무료 OCR 비교** — Google 드라이브 OCR(100개 언어, 무료), OneNote(99% 정확도), 네이버 CLOVA OCR(한국어 최적화), Google Cloud Vision(AI 기반)", "5. **엑셀 정규식 날짜 추출** — \"입고일정 : 25.3.17.(월)\" 형식에서 \"3/17\" 추출, FIND/MID 함수 조합으로 구현"]}, {"title": "실용 인사이트", "content": ["- Power Automate: \"Send Keys\"에서 Tab키가 텍스트로 입력되는 문제는 \"Insert special key\" 버튼으로 해결. \"Simulate keystrokes\" 옵션도 활성화 필요", "- UI 요소 폴더 호환: Outlook 특정 폴더에서만 작동 시, \"윈도우 제목 부분 일치\" 설정 또는 클립보드 방식(Ctrl+A → Ctrl+C)으로 대체", "- 흐름 변수 vs 일반 변수: 흐름 변수는 UI 입력에 직접 사용 불가할 수 있어 \"변수 설정\" 액션으로 변환 후 사용", "- 파일 정리 접근법: PowerShell 수집 → Python AI 분석/분류 → PowerShell 이동", "- Monica AI 단점: 유료 제한, 한국어 최적화 부족, 인터넷 필수, 데이터 보안 우려"]}, {"title": "[참고] 분류 이슈", "content": ["골프 브랜드 자본 구조(스포츠/비즈니스), 블라인드 장치 마진율·월 억대 매출 음식점·브런트 매출(창업아이디어), 미세먼지 환기(건강/생활), 인력사무소 앱(생활 정보) 등 다수 혼입"]}]}, {"name": "개발 엑셀 (116건)", "sections": [{"title": "핵심 요약", "content": ["엑셀 수식 작성과 데이터 가공이 최대 비중. TEXT 함수 날짜 포맷 변환, INDEX/MATCH/MID/FIND 조합 부품번호 추출, 조건부 서식, 엑셀 파일 한영 번역 등 고급 활용 사례가 집중되어 있다. 과불화화합물 조사양식, LCA 문서, 금형 문서 등 업무 문서 번역 니즈가 반복되며, AI 도구 관련 질문도 포함."]}, {"title": "주요 내용 Top 5", "content": ["1. **날짜 셀 -> 문자열 변환** — `=\"AP\"&TEXT(J9,\"YYYYMMDD\")&\"-30\"` 패턴으로 \"AP20250117-30\" 형식 자동 생성. 텍스트 날짜는 LEFT/MID로 분리 후 DATE 변환 필요", "2. **INDEX/MATCH/MID/FIND 부품번호 추출** — C열 괄호 안 부품번호를 MID+FIND로 추출, Sheet1 D열에서 MATCH로 검색, G열 값 반환. 동일 부품번호 2개일 경우 SUMIF 활용", "3. **조건부 서식** — `=AND($V5<TODAY(), OR(ISBLANK($W5),$W5=\"\"), YEAR($V5)>=2000)` 으로 기한 초과+미완료 행 표시. YEAR>=2000 조건으로 빈 셀 오작동 방지", "4. **엑셀 파일 한영 번역** — openpyxl 활용 시 한글 단순 제거와 의미 번역은 다른 작업. 도메인별 용어 매핑 테이블 필수, 양식 유지 채 셀별 매핑 방식 사용", "5. **SUM 범위 확장과 조건부 비교** — `=AND(N4<>\"\", SUM($AA4:$AU4)+Z4>=N4)` 형태로 기존 범위에 추가 셀 포함하여 조건 비교"]}, {"title": "실용 인사이트", "content": ["- TEXT(셀,\"YYYYMMDD\")는 날짜를 문자열로 변환하는 핵심 함수. 셀이 반드시 날짜형이어야 작동", "- MID + FIND 조합으로 특정 구분자(괄호, 하이픈 등) 사이 텍스트 추출 가능", "- INDIRECT(\"'\" & 시트명 & \"'!\" & 셀주소)로 동적 시트 참조 구현. 시트명에 특수문자 있으면 SUBSTITUTE로 전처리", "- 조건부 서식에서 YEAR(셀)>=2000을 추가하면 빈 셀(1900년대 기본값) 오작동 방지", "- 엑셀 파일 번역 시 한글 단순 제거와 의미 번역은 완전히 다른 작업 — 도메인별 용어 매핑 테이블이 핵심", "- ChatGPT 에이전트 모드: 파일 업로드 후 자동 코드 실행/파일 생성 가능(Plus 이상)", "- Gemini Advanced(유료)는 Ultra 모델, 더 긴 컨텍스트, Google Workspace 연동 제공"]}, {"title": "[참고] 분류 이슈", "content": ["허황옥/타밀어-한국어 유사어, \"반란\" 영어 번역, 골프장 카트 규정 등 엑셀/개발과 무관한 교양/여행 주제가 혼재"]}]}, {"name": "개발 - 파이썬 (48건)", "sections": [{"title": "핵심 요약", "content": ["파이썬 초보자가 파일 자동 정리 프로그램(V15~V40)을 반복 개선하는 과정이 핵심. Gemini API + PyQt6 GUI + 드래그앤드롭 구조로, JSON 파싱 실패(AI 잡소리), 429 에러(서버 과부하), 한글 PDF 인코딩(KSCms-UHC-H) 등 실전 트러블슈팅을 다룬다. MCP 서버 설정(Claude Desktop), 로컬 AI(Gemma/Ollama), 배포 방법도 포함."]}, {"title": "주요 내용 Top 5", "content": ["1. **파일 자동 정리 프로그램(V15~V40)** - Gemini API로 파일 내용 분석 후 폴더 분류. JSON 파싱 실패 원인: AI가 JSON 외 잡소리 추가 -> 정규표현식으로 JSON만 추출. 날짜 중복, \"기타\" 폴더 남발 문제 -> 폴더당 10개 이하 원칙으로 세분화", "2. **Python 3.13 vs 3.12 호환성** - tiktoken 등 AI 라이브러리 Wheel 미지원, Rust/Visual C++ 빌드 도구 필요 -> 3.12 다운그레이드 권장", "3. **로컬 AI Agent(Gemma + Ollama)** - 클라우드 AI 샌드박스 한계 극복. Ollama로 Gemma 2 설치 후 파이썬 연결, 파일 관리 에이전트 구축", "4. **MCP 서버 설정** - Claude Desktop에 filesystem/python/vision/Desktop Commander 서버 연결. PST 파일 읽기(pypff 라이브러리)", "5. **프로그램 배포 방법** - exe 외 대안: Streamlit/Flask 웹앱, Docker 컨테이너, 사내 서버 URL 공유"]}, {"title": "실용 인사이트", "content": ["- Gemini API 429 에러: gemini-2.5-pro는 속도 제한(1분 2건) 심함 -> 가벼운 모델 사용, 요청 간격 20초 이상", "- 파이썬 IDLE: `>>>` 프롬프트에 직접 붙여넣기 금지 -> File > New File에서 작성 후 F5 실행", "- PyPDF2 한글 인코딩 경고(KSCms-UHC-H): 에러 아닌 경고. 내용 읽기 불가 시 파일명 기반 처리", "- 파이썬 설치 시 \"Add Python to PATH\" 체크 필수", "- pywin32 설치 후 postinstall: `python Scripts\\pywin32_postinstall.py -install`", "- 클라우드 AI 한계: 사용자 PC와 단절된 샌드박스 -> 직접 파일 조작 불가, 사용자가 코드 실행해야 함", "- OpenClaw 대안: Nanobot(경량/감사), NanoClaw(Docker 격리), Claude Code(Anthropic 공식)"]}]}, {"name": "개발 웹 (63건)", "sections": [{"title": "핵심 요약", "content": ["AI 도구 활용법, 웹사이트 제작, MCP(Model Context Protocol) 설정, 로컬 AI 구동 등을 다룬다. Claude Desktop + MCP 설정 트러블슈팅이 상당 부분을 차지하며, AI 에이전트 비교, 웹사이트 빌더 추천, CBM 계산, BIS 규격 대응 등 실무 기술 내용도 포함된다."]}, {"title": "주요 내용 Top 5", "content": ["1. **Claude MCP 설정 및 트러블슈팅** — Node.js 설치 후 Claude Desktop에서 MCP Filesystem 서버 설정. JSON 경로에서 백슬래시 이스케이프(`C:\\\\`) 필수", "2. **AI 에이전트 비교** — Genspark(웹사이트 제작, 실시간 미리보기), Claude(로컬 파일 접근 MCP, 코딩 강점), Manus(자율 에이전트, 복잡 작업 수행)", "3. **웹사이트 제작 AI 추천** — Bolt.new, Lovable(구 GPT Engineer), Vercel v0이 웹사이트 빌딩 특화. GitHub Pages로 무료 배포 가능", "4. **웹페이지 변경 모니터링** — Distill Web Monitor(크롬 확장)로 특정 페이지 변경 감지 및 알림 설정 가능", "5. **CBM 계산 및 BIS 규격 대응** — CBM = 길이(m) x 너비(m) x 높이(m). STS410 → BIS X12Cr12, Posco 304 → BIS X04Cr19Ni9"]}, {"title": "실용 인사이트", "content": ["- Claude Desktop + MCP Filesystem 서버로 AI가 로컬 파일을 직접 읽고 정리 가능. JSON 경로에서 `\\\\` 이스케이프 필수", "- 웹사이트 빠른 제작에는 Bolt.new나 Lovable이 편리하며, GitHub Pages로 무료 배포 가능", "- 로컬 AI 실행은 Ollama가 가장 간편하고, 고성능 필요 시 llama.cpp나 vLLM이 대안", "- 웹페이지 변경 모니터링은 Distill Web Monitor(무료)로 충분", "- 한국 철강 규격(STS)과 인도 BIS 규격 간 대응 관계를 파악해두면 수출 서류 작성에 유용"]}, {"title": "[참고] 분류 이슈", "content": ["체코 유행병, WHO 웹사이트 주소 등 건강/해외여행 관련 질문이 일부 혼입되어 있음."]}]}, {"name": "개발 크롤링 (5건)", "sections": [{"title": "핵심 요약", "content": ["파일 정리 자동화와 웹 크롤링에 관한 짧은 대화. 파일 분류를 위한 인덱싱(장부) 사전 생성 아이디어와, 홈플러스 문화센터 강좌 데이터를 엑셀로 크롤링하는 방법을 다룬다."]}, {"title": "주요 내용 Top 5", "content": ["1. **파일 분류 2단계 전략** — 1단계(인덱싱: \"정리계획표.xlsx\" 생성) → 2단계(실제 이동). 검색엔진과 동일한 \"크롤링 후 인덱싱\" 원리. 속도 향상 및 실패율 0%", "2. **동적 웹페이지 크롤링** — 홈플러스 문화센터는 POST 방식 동적 페이지 → 엑셀 데이터 가져오기 불가(URL 불변, 껍데기만 가져옴) → 파이썬(requests/selenium) 크롤링 필수", "3. **pip 설치 주의** — 패키지명 오타(open-interprete vs open-interpreter) 확인 필수"]}, {"title": "실용 인사이트", "content": ["- 대량 파일 정리 시 \"인덱싱 먼저, 이동은 나중에\" 전략이 실수를 줄임", "- 동적 웹페이지(POST 방식)는 엑셀 웹쿼리로 불가, 파이썬 크롤링 필수"]}]}, {"name": "개발 - 앱/게임 (148건)", "sections": [{"title": "핵심 요약", "content": ["악기 학습 앱 기획, 중국 제품 수입 판매 전략, 골프 팀 편성 최적화, 게임 개발 프롬프트 작성이 핵심. 악기 앱은 리듬게임+실제 악기 UI+교육 효과를 결합한 구상으로, Yousician/Simply Guitar/Melodics 분석 후 바이올린 시뮬레이터 프롬프트까지 완성. 게임은 고조선 RPG(Three.js), 하츄핑, 슈퍼마리오 클론(Pygame) 등을 다룬다."]}, {"title": "주요 내용 Top 5", "content": ["1. **중국 제품 수입 판매 전략** - KC 인증 우회를 위한 구매대행(\"고객 해외 주문 대행\" 형태, 국내 재고 보관 시 유통 간주 위험). 인증 불필요 고마진 아이템 20종: 여드름패치, 패션쥬얼리, 블라인드박스, 실크베개커버, 마사지도구 등", "2. **7명 골프 팀 편성 최적화** - 4인+3인으로 5게임, 모든 페어 2-3회 만남 목표. 수학적 한계: 21페어 평균 2.14회, 최소 3쌍은 3회 필연. 6게임 확장 시 해결 가능", "3. **악기 학습 앱 기획** - Yousician(마이크 인식), Simply Guitar(코드 따라치기), Melodics(MIDI 연결) 분석. Claude Artifacts용 단일 HTML 바이올린 시뮬레이터 프롬프트 완성", "4. **고전 게임 에뮬레이터** - RetroArch, GENPlusDroid, MD.emu 추천. Little Fighter 2 모바일 실행(ExaGear). Android 11+ 스토리지 권한 이슈", "5. **게임 개발 프롬프트** - Three.js 고조선 턴제 RPG, Pygame 슈퍼마리오 클론. Claude Artifacts 환경 단일 HTML 구조"]}, {"title": "실용 인사이트", "content": ["- 구매대행 핵심: \"고객 해외 주문 대행\" 형태로 KC 인증 우회 가능 (국내 재고 보관 시 유통 간주 위험)", "- 인증 불요 고마진 아이템: 여드름패치, 패션쥬얼리, 블라인드박스(盲盒), 실크베개커버, 스티커, 비전자 마사지도구", "- 긴축재정기 인기 품목: PB제품, 대체재(믹스커피/집밥), 수리용품, 소형 사치품(립스틱 효과)", "- 골프 편성 수학: 7명 4:3 구성, 게임당 9쌍, 5게임 총 45쌍 = 21페어 평균 2.14회", "- 서초동 피아노 학원: 1시간 주1회 기준 월 15-25만원대", "- 피싱 협박 대응: \"녹음 중이며 사이버수사대 제출 예정\" 단호히 말하고 즉시 끊기. 118(KISA) 또는 ecrm.police.go.kr 신고"]}, {"title": "[참고] 분류 이슈", "content": ["소아비만 블로그/시 작성(건강 주제), 스포츠 승부조작 징계(시사), 서초동 배달음식/영동중학교 이전(생활정보), 피싱 대응(보안), Soggy Doggy 보드게임(비디지털), \"결이 비슷하다\" 표현(국어) 등 무관 항목이 원본에 혼입되어 있음"]}]}, {"name": "NCS 시험 / 엑셀 조건부 서식 (1,021건)", "sections": [{"title": "핵심 요약", "content": ["NCS 직업기초능력평가(비즈니스 문서 작성, 커뮤니케이션, 토론, 보고서 작성) 시험 문제 풀이와 엑셀 조건부 서식(입고 수량 관리용 빨강/노랑/초록 색상 규칙) 설정이 핵심이다. 엑셀 조건부 서식은 N4:T55 범위에서 실제 입고량과 누적 계획량을 비교하는 로직을 수차례 수정·디버깅하는 과정이 상세히 기록되어 있다."]}, {"title": "주요 내용 Top 5", "content": ["1. **엑셀 조건부 서식 (입고관리)** — N4:T55 범위에서 W4:AQ4 실제 입고량과 누적 계획량 비교. 빨강(일정 지남+부족), 노랑(일정 미래+부족), 초록(입고 완료). 핵심 수식: `=AND(N4<>\"\", N$3<TODAY(), SUM(W4:AQ4)<SUM($N4:N4))`", "2. **조건부 서식 우선순위** — 노랑(1순위) → 빨강(2순위) → 초록(3순위)으로 설정해야 충돌 방지", "3. **NCS 비즈니스 커뮤니케이션** — 비즈니스 문서는 항상 긍정문만이 아님(정답), 사실토론 4가지 쟁점(추측·정의·정도·결과), 설득 3요소(정보원·메시지·채널)", "4. **보고서 작성 4원칙** — 필요성, 완전성, 적시성, 간결성 (간결성: 결론부터 제시 후 원인·경과 설명)", "5. **협상·비평 기법** — 다른 문화권 협상 시 유연한 대응 필요. 비평은 전체보다 일부분, 단점 후 장점, 가능성 칭찬이 원칙"]}, {"title": "실용 인사이트", "content": ["- **조건부 서식 디버깅**: 빈 셀에 조건 수식을 직접 입력해 TRUE/FALSE 확인 후 적용", "- **누적 비교 수식 패턴**: `SUM($N4:N4)` 형태로 셀 참조가 자동 확장되어 누적 계획량 계산", "- **NCS 시험 포인트**: 직면의 4요소 중 \"가변성\"은 해당하지 않는 항목, \"길고 장황한 설명\"은 좋은 메시지 조건에서 오답"]}, {"title": "[참고] 분류 이슈", "content": ["원본 분류명 \"건강 의료\"는 실제 내용과 불일치. 95% 이상이 NCS 문제 풀이와 엑셀 수식이며, 건강 관련은 극소수(부정교합, 감 과다 섭취 등 단편적 질문)에 불과."]}]}]}, {"name": "7. 창작/콘텐츠 (884건)", "topics": [{"name": "창작 이미지 (548건)", "sections": [{"title": "핵심 요약", "content": ["가장 많은 건수를 차지하나 실제로는 잡다한 일상 요청의 총합에 가깝다. AI 이미지 생성(지브리/드래곤볼/티니핑 스타일 변환), 업무 문서 번역, 자동차 엔진오일 비교, 여행 계획(오키나와, 통영, 합천), 비행기 구조/과학 원리, 맥북-윈도우 파일 전송, 의류 샘플 제작 등이 혼재한다. 아이 사진을 다양한 애니메이션 스타일로 변환하는 요청이 반복적."]}, {"title": "주요 내용 Top 5", "content": ["1. **아이 사진 스타일 변환** — 지브리, 드래곤볼, 티니핑 스타일로 반복 변환. 티니핑 프롬프트 핵심: \"bright pastel colors, sparkling eyes, rounded facial features, magical whimsical atmosphere\"", "2. **업무 문서 영문 번역 + 엑셀 표 변환** — 인보이스 목록을 TSV 형식으로 변환하여 엑셀에 바로 붙여넣기 가능하게 처리", "3. **오키나와 스노클링 명소 10선** — 비세자키 해안(접근성+물고기 풍부도 최고), 고릴라촙, 케라마 제도 등", "4. **자동차 엔진오일 3종 비교** — Kixx PAO1(100% PAO, 극한 내구성) / ZIC Racing(PAO+Group V, 고속 특화) / ZIC X9(VHVI, 일상+가성비)", "5. **미방문 지역 중심 여행 계획** — 구글 타임라인에서 빈 지역을 찾아 15일~한 달 장기 일정 수립"]}, {"title": "실용 인사이트", "content": ["- 엑셀 표 복붙 시 TSV(탭 구분) 형식이 가장 깔끔", "- 맥북→윈도우 대용량 파일 전송: exFAT 포맷 외장하드 최적 (FAT32: 4GB 제한, NTFS: 맥 쓰기 불가)", "- 엔진오일 선택: 고속/서킷 → ZIC Racing / 일상+가성비 → ZIC X9 / 극한 내구성 → Kixx PAO1", "- 한국 엔진오일 기술력: SK루브리컨츠(ZIC) > GS칼텍스(Kixx) > S-OIL 7 > 현대오일뱅크(XTeer)", "- 여행 일정 엑셀: Day/Time/Activity/Place/Address/Cost/Notes 컬럼 구조가 실용적", "- 도시 설계 일조권: 50층 아파트 기준 약 75~100m 간격 필요"]}, {"title": "[참고] 분류 이슈", "content": ["카테고리명과 실제 내용 괴리가 가장 큼. 업무 번역(APG Garrett 통합 가능), 여행 계획, 자동차, 과학/교양 등 다수 주제 혼입. 카테고리명을 \"일상 요청 종합\" 또는 \"기타\"로 변경 권장."]}]}, {"name": "창작 영상 (102건)", "sections": [{"title": "핵심 요약", "content": ["유튜브 콘텐츠 제작, AI 영상 생성, 저작권 문제, 캐릭터 애니메이션 제작 등 창작 활동 관련 대화이다. 모차르트 클래식 음악 영상 제작, 고양이 캐릭터 영어교육 숏폼, AI 시대 게임 유튜버 전략, Gemini 앱 음성 대화 기반 영상 기획 등이 주요 주제."]}, {"title": "주요 내용 Top 5", "content": ["1. **모차르트 K.1a 안단테 C장조 영상 제작** — 곡 자체는 퍼블릭 도메인(사후 70년 경과)이나 연주 음원에는 저작인접권 존재. 유튜브 오디오 보관함 또는 'No Copyright Music' 검색으로 무료 음원 확보. 8초 숏폼: 1756년 잘츠부르크 → 3살 건반 → 5살 첫 작곡 K.1.", "2. **고양이 캐릭터 영어교육 숏폼 시리즈** — 벨라(엄마) + 모찌(아기) + 로밍 키키(하얀 고양이) 캐릭터 활용. \"Starving\", \"Break a leg\" 등 영어 표현 교육. 3D 애니메이션 스타일, 나노바나나 프롬프트 활용.", "3. **AI 시대 게임 유튜버 생존 전략** — AI 커맨더 모드: LLM 지시에만 따르는 챌린지 콘텐츠. AI를 콘텐츠 주인공으로 활용하는 \"The Experimenter\" 포맷. 기획력 + 기술 결합이 핵심.", "4. **클래식 음악 유튜브 저작권 규칙** — 작곡가 사후 70년 경과 시 악보 자체는 무료. 연주 녹음물에는 연주자의 저작인접권 존재. AI 생성 영상 유튜브 업로드 가능하나 음원 저작권 확인 필수.", "5. **Gemini 앱 기반 영상 기획** — 돼지→아빠 변신 영상, 도리를찾아서+엘레멘탈 합성, 고주몽 알 탄생 등 다양한 AI 영상 생성 요청. 아동 체육 교육 관련 영상+AI 활용 기획. Maltbook(AI만 대화하는 SNS) 등 콘텐츠 소재 발굴."]}, {"title": "실용 인사이트", "content": ["- AI 생성 영상 유튜브 업로드 시 음원 저작권이 최대 리스크 → 유튜브 오디오 보관함 활용 권장", "- 숏폼 영어교육: 캐릭터 + 상황극 + 핵심 표현 자막 조합이 효과적", "- 영상 프롬프트 작성 시 카메라 앵글, 인물 표정/동작, 대사, 영상 길이를 구체적으로 명시해야 일관된 결과물 확보", "- 클래식 유튜브: 유튜브 오디오 보관함 클래식 버전 사용 시 저작인접권 문제 회피 가능", "[참고] 분류 이슈: 원본 102건 중 상당수가 상식(3D 해부 앱, 슬램덩크 명대사, 피자 가격 등), 정치(명태균 게이트, 검찰 vs 공수처), AI도구(실시간 번역 자막, 썬더볼트5)에 해당하는 항목이 혼재되어 있었으며, 본 정리에서는 실제 창작 영상 주제만 포함함."]}]}, {"name": "창작 스토리 (234건)", "sections": [{"title": "핵심 요약", "content": ["AI 이미지 스타일 변환, 과학/수학 기초 탐구, 건강/일상 정보의 세 갈래로 구성된다. 가족 사진을 지브리/티니핑/원피스/심슨 스타일로 변환하는 시도가 가장 많고, 소리와 빛의 물리학에서 초끈이론까지 꼬리물기식 탐구, 질병코드·소변 생리학 등 건강 정보도 포함된다."]}, {"title": "주요 내용 Top 5", "content": ["1. **소리와 빛의 주파수 관계** — 소리는 매질 필요한 기계적 파동(종파, 20Hz~20kHz), 빛은 매질 불필요한 전자기파(횡파, 430~750THz). FM 87.5~108MHz, 5G는 3.5~28GHz 대역", "2. **통일장 이론과 초끈이론** — 4가지 기본 힘(중력, 전자기력, 강한/약한 상호작용) 통합 시도. 초끈이론은 기본 입자를 1차원 끈의 진동으로 설명하며 10차원 시공간 필요", "3. **AI 이미지 스타일 변환** — 지브리(수채화, 따뜻한 조명), 티니핑(3D, 반짝이 눈), 원피스(오다 에이치로 작화풍), 심슨(노란 피부, 단순 비율)으로 가족 사진 변환. AI의 스타일 재현 한계로 반복 수정 필요", "4. **질병코드 K76.0 (지방간)** — 알코올성(K70)과 비알코올성(NAFLD) 구분. 혈액검사·초음파·CT·MRI로 진단하며 생활습관 개선이 기본 치료", "5. **소변 생리학과 초음파 검사 준비** — 수분 섭취 후 방광 도달까지 5분~2시간, 최대 용량 400~600ml. 검사 1.5~2시간 전 물 500~1000ml 섭취 후 소변 참기"]}, {"title": "실용 인사이트", "content": ["- 소리는 전자기파가 아닌 기계적 파동이므로 진공에서 전달 불가. 라디오와 휴대전화는 전자기파 활용", "- 디스플레이 플리커의 주원인은 PWM 방식 밝기 조절이며, 2000Hz 이상 고주파 PWM이 해결책", "- AI 이미지 스타일별 핵심 프롬프트: 지브리=\"watercolor, warm lighting\", 원피스=\"Eiichiro Oda style\", 티니핑=\"3D, sparkly eyes\". 정확한 재현에는 한계가 있어 반복 수정 필요", "- 알리익스프레스에서 브랜드 검색 시 직접 브랜드명 대신 약어/별칭 사용 필요 (Nike → \"Nk, Swoosh\" 등)", "- 물 과다 섭취 시 저나트륨혈증(물 중독) 위험이 있으므로 소변 초음파 준비 시에도 500ml~1L 이내로 조절"]}, {"title": "[참고] 분류 이슈", "content": ["\"창작 스토리\" 명칭이 실제 내용과 불일치. \"AI 이미지 생성 + 과학 탐구 + 생활 정보\"로 재명명 권장."]}]}]}, {"name": "8. 육아/교육 (125건)", "topics": [{"name": "육아 (125건)", "sections": [{"title": "핵심 요약", "content": ["2020년생 자녀의 교육과 발달에 관한 대화가 포함되어 있으나, 엑셀 조건부 서식을 활용한 입고현황 관리가 대화의 상당 부분을 차지한다. 순수 육아 내용으로는 숫자 세기(한자어/고유어 구분), 육아휴직 급여, 5~6세 집중력 발달 등이 있다."]}, {"title": "주요 내용 Top 5", "content": ["1. **엑셀 입고현황 조건부 서식** - W4:AQ55 영역에 입고 상태별 색상 표시(초록=완료, 노란=진행중, 빨간=미입고). SUMIFS 기반 누적 수량 비교. 수차례 수정에도 원하는 결과를 얻지 못해 좌절 반복", "2. **육아휴직 급여** - 2025년 기준 통상임금 80%(상한 160만원/하한 70만원). 6+6 부모육아휴직제는 첫 6개월 통상임금 100%(상한 200만원~)", "3. **숫자 세기 교육** - \"백\"은 한자어 숫자(일/이/삼)와 함께 사용, 고유어(하나/둘/셋)와는 혼용 불가. 백일(101), 백이(102) 등", "4. **5~6세 집중력 발달** - 평균 집중 시간 10~15분, 환경 자극 최소화 필요, 10분 활동 → 2~3분 휴식 패턴 권장", "5. **조건부 서식 규칙 우선순위** - 빨간(미입고) → 노란(부분입고) → 초록(완료) 순서 적용, 오늘 이후 날짜는 색상 미표시"]}, {"title": "실용 인사이트", "content": ["- **엑셀 조건부 서식**: 규칙 수가 많으면 우선순위 충돌 → 기존 규칙 전체 삭제 후 재설정이 안전", "- **SUMIFS 수식**: 절대참조($)와 혼합참조 구분이 정상 작동의 핵심", "- **조건부 서식 적용 순서**: 빨간(미입고) → 초록(완료) → 노란(진행중) → 미래 날짜 숨김", "- **육아휴직**: 맞벌이 부부 동시/순차 사용 시 6+6 제도로 급여 상한 대폭 상승", "- **유아 숫자 교육**: 한자어(일/이/삼)와 고유어(하나/둘/셋) 체계를 구분하여 가르쳐야 혼동 방지"]}, {"title": "[참고] 분류 이슈", "content": ["엑셀 입고현황 조건부 서식 대화가 전체의 절반 이상 차지. \"업무 도구/엑셀\" 또는 \"APG KSPG\"로 재분류 권장. 순수 육아 내용은 30~40% 수준."]}]}, {"name": "육아/문화센터 (6건)", "sections": [{"title": "핵심 요약", "content": ["2020년생(6세) 자녀의 문화센터 강좌 탐색. 백화점·대형마트의 학기별 접수 일정, 오후 4시 30분 이후 시간대의 악기(쁘띠 바이올린)와 K-POP 댄스 강좌를 집중 탐색. NC백화점, 지역 공공시설도 추가 조사."]}, {"title": "주요 내용 Top 5", "content": ["1. **3월 강좌 접수 일정** — 백화점은 1월 24~26일경(기존회원 우선), 마트는 1월 25일~2월 1일 시작", "2. **유통사 외 문화센터** — NC백화점(이랜드), 구민체육센터, 주민센터 등 공공시설에서도 유사 강좌 개설", "3. **6세 추천 강좌** — 창의미술, 오감발달, K-POP 댄스, 악기(바이올린, 우쿨렐레), 체육(발레, 태권도)", "4. **쁘띠 바이올린 개설 현황** — 롯데백화점(화/목 16:40~17:30), 롯데마트(월/수 16:30~) 등 소수정예 운영", "5. **7개 유통사 악기/K-POP 댄스 통합 검색** — 서울 수도권 오후 4:30 이후 수강 가능 강좌 종합 리스트"]}, {"title": "실용 인사이트", "content": ["- 하원 후 **황금 시간대: 16:30~17:30**", "- 정규 접수 마감 후에도 **개강 첫 주 추가 접수(중도 수강 신청)** 가능한 곳 많음", "- K-POP 댄스가 6세 **인기 1순위**, 악기는 바이올린/우쿨렐레 대표적", "- 백화점이 마트보다 접수 일정 **3~5일 빠름** (기존회원 우선접수 제도)", "- 홈플러스/이마트는 **목요일 강좌 오픈** 경향"]}]}]}, {"name": "9. 생활/여행/상식 (1,186건)", "topics": [{"name": "음식/여행/건강 (64건)", "sections": [{"title": "핵심 요약", "content": ["원래 \"요리\"로 분류되어 있으나 실제는 음식/맛집 추천, 여행 일정 수립, 건강 정보가 주요 구성이다. 통영 3박4일 여행 일정, 영종도 겨울 여행, 서울 빵집 투어, 호주 퍼스 여행 등 실제 여행 계획이 상세히 다뤄진다. 건강 관련 식품 정보(본 마로우, 철분 함량, T/B세포 생성 영양소)와 세계 동물원 종수 순위, 홍콩 음식 문화 등도 포함."]}, {"title": "주요 내용 Top 5", "content": ["1. **통영 여행 일정 + 맛집** — 3박4일 아침/점심/저녁 포함 완전한 일정표. 티맵 랭킹 맛집 배치(뚱보할매김밥, 통영해물뚝배기, 민수사횟집 등), 동선 최적화", "2. **철분 풍부 음식 총정리** — 동물성: 돼지간 18mg/100g, 닭간 9mg, 소간 6.5mg. 식물성: 참깨 14.6mg, 호박씨 8.8mg. 헤믹 철분(동물성)이 흡수율 훨씬 높음", "3. **세계 동물원 종수 순위** — 1위 베를린(1,500종), 2위 오마하 헨리둘리(962종), 3위 베이징(950종). 서울대공원(310종)은 상위 10위권 밖", "4. **서울 빵맛집 목록** — 태극당(전통 카스테라), 프릳츠(뉴트로 감성), 어니언 안국(한옥 까눌레) 등", "5. **영동고속도로 돈까스** — 동해 방면 구정휴게소 \"왕큰돈가스\", 강릉휴게소 돈까스 정식 추천"]}, {"title": "실용 인사이트", "content": ["- 서울대공원 실내 식사: 기린 푸드코트, 분수대 푸드플라자, 코뿔소 푸드하우스 이용 가능. 외부 음식 실내 반입은 대부분 제한", "- 10월 통영 바다수영: 해수온 21~23도로 짧은 물놀이 가능, 장시간은 위험. 25도 이상이 편안한 수온", "- 한강 취사 금지: 지정 장소 외 버너/코펠 적발 시 과태료 100만 원. 조리 완료 음식·배달은 허용", "- 본 마로우(골수): 오메가-3/6, 콜라겐, 비타민 A/K2, 글루코사민 풍부. 관절/장/뇌 건강에 도움이나 고칼로리 주의", "- T/B세포 생성 영양소: 단백질(닭고기, 달걀, 두부), 아연(T세포 발달 핵심), 비타민C, 비타민D", "- 홍콩 大快活(Fairwood): 광둥어 \"따이 파이 우웃\", 1972년 설립 패스트푸드 체인, 홍콩 전역 150여 매장", "- 뜨거운 음식 보관: 실온 30분~1시간 식힌 뒤 냉장, 또는 얼음물에 냄비째 담가 급냉 후 보관"]}, {"title": "[참고] 분류 이슈", "content": ["18번가 가요리믹스(유흥/생활), 캄보디아 BJ 1인 시위·이종호 음성(시사/뉴스), 고양이 영어 교육(콘텐츠 제작), 백허그 스킨십·소개팅 식당(연애/생활), 인당 GDP 순위(경제 상식), 펠티어 소자(과학 상식), 웨이하이 밤문화(여행/유흥) 등 혼입 다수. 카테고리 순도가 가장 낮음"]}]}, {"name": "여행 (31건)", "sections": [{"title": "핵심 요약", "content": ["울릉도/독도 여행 계획, 서울 K-POP 촬영지 최단 경로, 일본식 온천 추천 등 여행 플래닝이 중심. 체 게바라 역사, 속초 게스트하우스 파티 등 교양/생활 질문도 혼재되어 있다."]}, {"title": "주요 내용 Top 5", "content": ["1. **울릉도 접근 경로** — 강릉항(3.5~4시간), 포항항(3시간 쾌속선), 후포항(2.5~3시간, 최단), 묵호항(3~3.5시간). 기상에 따라 결항 가능", "2. **서울-내륙-울릉도 9박10일 코스** — 서울->괴산->보은->예천->의성->군위->청송->영덕->영양->울진->후포항->울릉도+독도->귀환", "3. **케이팝데몬헌터스 촬영지 최단 경로** — 서초동 출발 기준 2가지: COEX 최종(N서울타워->명동->경복궁->북촌->낙산공원->올림픽주경기장->COEX), 롯데월드타워 최종", "4. **체 게바라의 쿠바행** — 남미 여행 중 민중 착취 목격->과테말라 쿠데타->멕시코 망명->카스트로와 만남->쿠바 혁명 참여", "5. **일본식 온천 느낌 국내 추천** — 양평 길조 호텔(료칸), 히노끼탕, 가이세키 정식 등. 서울 근교부터 거리순 정리"]}, {"title": "실용 인사이트", "content": ["- 울릉도 여행은 후포항이 최단 출항지(2.5~3시간), 기상 변동 대비 여유 일정 필수", "- 서울 관광지 최단 경로는 지리적 클러스터링(강남권->도심권->동대문권)으로 동선 효율화", "- 속초 게스트하우스 파티는 공식 SNS/전화로 당일 일정 확인 필수", "- 신라호텔 웨딩 식대: 1인당 12~30만 원(코스별 차이), 대관료 별도", "- Oofos 슬리퍼: OOfoam(폐쇄 셀 구조 고밀도 폼), 일반 EVA 대비 37% 높은 충격 흡수력"]}, {"title": "[참고] 분류 이슈", "content": ["수면 패턴, 발지압 건강, 중고차판매, 웨딩 식대, 보험 번역, 내기 합법성 등 여행과 무관한 생활/교양 질문이 이 카테고리에 혼재"]}]}, {"name": "과학 상식 (43건)", "sections": [{"title": "핵심 요약", "content": ["양자컴퓨터, 핵융합, 원소 변환(연금술), 지구온난화 해결 기술, 저온 열에너지 활용 등 과학 기술 전반에 대한 호기심 중심의 대화이다. \"지구의 미지근한 열(30~40도)로 전기를 생산할 수 있는가\"라는 아이디어에서 출발하여 ORC, 히트펌프, 펠티어 소자, 복사냉각 등 다양한 기술을 탐색한다. 불교 49재/유교 장례, 꿈 해석, 가위눌림 등 인문·종교·심리 상식도 포함."]}, {"title": "주요 내용 Top 5", "content": ["1. **수은→금 변환 실제 사례** — 1941년 하버드대 Sherr 박사팀, 입자가속기로 수은에서 금 원자 생성 성공 (Physical Review, Vol.60, 1941). 비용이 금값의 수만 배여서 비실용적.", "2. **양자컴퓨터 vs 고전컴퓨터** — 양자컴퓨터는 소인수분해·최적화·양자시뮬레이션에서 지수적 속도 향상. 구글 Willow 칩: 슈퍼컴퓨터 3.2년 걸릴 연산을 2.1시간에 처리.", "3. **미지근한 열로 전기 생산** — ORC(유기 랭킨 사이클): 끓는점 30~40도 액체 사용, 50도 정도 열원으로도 발전 가능(온천수·공장 배수열 활용). TEG(열전발전기)는 온도차 필요.", "4. **지구 냉각 기술** — 복사냉각(Radiative Sky Cooling): 대기 창(Atmospheric Window)을 통해 열을 우주로 직접 방출하는 나노소재 기술", "5. **펠티어 소자 건물 적용** — 여름: 외벽 고열을 라디에이터로 집중 → ORC로 재발전. 겨울: 외벽 차갑고 실내 따뜻하게 유지. 냉방+발전 순환 시스템 구상."]}, {"title": "실용 인사이트", "content": ["- **히트펌프 효율**: 전기 1 투입 → 대기 중 열 3~4 회수 (300~400% 효율)", "- **가위눌림 원인**: REM 수면 중 뇌는 깨고 몸은 마비 유지 시 발생. 편도체 활성화로 환각 동반", "- **시금치+두부 조합**: 수산과 칼슘이 장내에서 결합 → 대변 배출 → 오히려 결석 예방에 도움 (기존 통설과 반대)", "- **인덕션 원리**: 구리 코일에 고주파 교류 → 자기장 → 자성 금속 냄비에 와전류 → 저항열로 가열", "- **생애최초 주택 LTV**: 지역 무관 최대 80%(한도 6억), DSR 40% 규제 적용", "- **초전도체 동향**: 2024년 와세다대 Bi2212 광학특성 연구, 스탠퍼드대 Nd2-xCexCuO4 연구 등 진전 중", "*최종 정리일: 2026-03-18 | 정리팀: 5 | 원본: D:/AI/chatgpt_analysis/teams/group_5.json*"]}]}, {"name": "상식 (32건)", "sections": [{"title": "핵심 요약", "content": ["자동차 산업 지식(카본 휠, 타이어, 판매량 순위), 일상 상식(이탈리아어, 화장품), 기술 상식(썬더볼트5) 등 다양한 분야의 일반 지식 질문이다. 자동차 업계 종사자의 전문 지식과 일상적 호기심이 혼재."]}, {"title": "주요 내용 Top 5", "content": ["1. **카본 휠 기술 및 제조사** — Carbon Revolution(호주)은 세계 최대 자동차 카본 휠 제조사로 연간 150만 개 생산 목표. Dymag(영국)은 현대 N라인 전용 카본 하이브리드 휠 파트너. 카본은 주조 불가 → RTM, 진공 주입, 프리프레그 레이업 공정 사용. 알루미늄 대비 40~50% 경량.", "2. **글로벌 자동차 판매량/매출 순위 (2024년)** — 판매량: Toyota > VW > Hyundai-Kia > Renault-Nissan. 매출: VW(약 $318B) > Toyota(약 $310B) > Mercedes > BMW. 현대차 그룹 미국 연간 판매 약 169만 대(전년 대비 +2.7%).", "3. **타이어 사이드월 부풀음(Bulge) 원인 및 보증** — 대부분 외부 충격(연석, 포트홀)으로 보증 제외. 제조 결함 가능: 카카스 코드 정렬 불량, 코드-고무 접착 불량, 가류 온도/시간 이상. 보증 조건: 1만 km 내 + 충격 흔적 없음 + 동일 LOT 반복 불량.", "4. **이탈리아어/화장품/연봉 등 일상 상식** — 방어(생선)는 이탈리아어로 \"Ricciola\". Yepoda(예쁘다)는 한국 생산이나 유럽 시장 전용으로 한국 내 구매 불가. 자동차 업계 46세 연봉 7,500만 원은 완성차 대비 저평가(1차 협력사 부장급 표준 8,500~9,500만 원).", "5. **자동차 부품 협력사 정보** — 영신금속: 볼트/스크루/리벳 냉간압조 전문(코스닥 상장). YM(와이엠): EV 릴레이, 배터리 모듈 부품. DMC(동아공업): 엔진용 가스켓, 현대/기아 협력사."]}, {"title": "실용 인사이트", "content": ["- 카본 휠은 주물 불가 → RTM(수지 전이 성형)이 대량생산에 가장 근접한 공정", "- 타이어 사이드월 부풀음 발생 시: 사진 촬영 + 주행거리 기록 + 동일 LOT 불량 사례 수집이 보증 청구 핵심", "- 현대차 그룹 미국 판매: 약 169만 대/년(2024), 꾸준한 성장세", "- 공유킥보드 vs 자전거 사고율: PM 전체 사고 중 전동 킥보드 2.0%, 자전거 23.1% (TAAS 기준)", "[참고] 분류 이슈: 자동차 부품 협력사 항목(영신금속, YM, DMC 등)은 APG 발주 카테고리가 더 적합. 반대로 창작 영상에서 상식으로 재분류해야 할 항목(3D 해부 앱, 슬램덩크 명대사, 검찰 vs 공수처 등)이 다수 존재."]}]}, {"name": "종교 (5건)", "sections": [{"title": "핵심 요약", "content": ["종교 자체보다는 다문화 소통과 생활 정보에 가까운 질문들이다. 광둥어 생일 축하 메시지 작성, 교회 사이비 여부 확인, 구글 지도 혼잡도, 성가대 참여 장점 등이 포함된다."]}, {"title": "주요 내용 Top 5", "content": ["1. **광둥어 생일 축하 메시지**: 장인어른께 보내는 광둥어 로마자 발음 + 한국어 번역 하이 3월), Canton Fair(광저우 4/10월), Kitchen & Bath China(상하이 5월)", "[참고] 분류 이슈: 사출 금형/NISSAN TL 관련 내용은 APG 업무와 연관성이 있으나 원본 분류가 \"기타\"로 되어 있어 그대로 유지"]}]}]}];

const CAT_ICONS = ['💼','🏠','📈','🚀','🏥','💻','🎨','👶','🌍'];
const CAT_COLORS = ['#6c8aff','#f87171','#34d399','#fb923c','#f472b6','#a78bfa','#fbbf24','#67e8f9','#94a3b8'];

function escapeHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function parseLine(line) {
  line = escapeHtml(line.trim());
  // Bold
  line = line.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  // Inline code
  line = line.replace(/`([^`]+)`/g, '<code>$1</code>');
  // Em dash
  line = line.replace(/ — /g, ' &mdash; ');
  line = line.replace(/ - /g, ' &ndash; ');
  return line;
}

function renderSection(sec) {
  let cls = 'section-label';
  if (sec.title.includes('인사이트')) cls += ' insight';
  if (sec.title.includes('분류 이슈') || sec.title.includes('[참고]')) cls += ' issue';

  let html = `<div class="section-block"><div class="${cls}">${escapeHtml(sec.title)}</div><div class="section-text">`;

  let inList = false;
  let listType = '';

  for (let line of sec.content) {
    let trimmed = line.trim();
    if (!trimmed) continue;

    let numMatch = trimmed.match(/^(\d+)\.\s+(.+)/);
    let bulletMatch = trimmed.match(/^[-*]\s+(.+)/);

    if (numMatch) {
      if (!inList || listType !== 'ol') {
        if (inList) html += listType === 'ol' ? '</ol>' : '</ul>';
        html += '<ol>';
        inList = true;
        listType = 'ol';
      }
      html += `<li>${parseLine(numMatch[2])}</li>`;
    } else if (bulletMatch) {
      if (!inList || listType !== 'ul') {
        if (inList) html += listType === 'ol' ? '</ol>' : '</ul>';
        html += '<ul>';
        inList = true;
        listType = 'ul';
      }
      html += `<li>${parseLine(bulletMatch[1])}</li>`;
    } else {
      if (inList) {
        html += listType === 'ol' ? '</ol>' : '</ul>';
        inList = false;
      }
      html += `<p>${parseLine(trimmed)}</p>`;
    }
  }
  if (inList) html += listType === 'ol' ? '</ol>' : '</ul>';
  html += '</div></div>';
  return html;
}

function buildPage() {
  let sidebarHtml = '';
  let mainHtml = '';

  DATA.forEach((cat, ci) => {
    const icon = CAT_ICONS[ci] || '📁';
    const catId = `cat-${ci}`;

    // Sidebar
    sidebarHtml += `<div class="nav-cat">
      <button class="nav-cat-btn" onclick="toggleNav(${ci})">
        <span class="cat-icon">${icon}</span>
        ${escapeHtml(cat.name.replace(/^\d+\.\s+/,'').split('(')[0].trim())}
        <span class="count">${cat.topics.length}</span>
      </button>
      <div class="nav-topics" id="nav-${ci}">`;
    cat.topics.forEach((t, ti) => {
      sidebarHtml += `<a class="nav-topic" onclick="scrollToTopic(${ci},${ti})">${escapeHtml(t.name.split('(')[0].trim())}</a>`;
    });
    sidebarHtml += '</div></div>';

    // Main
    mainHtml += `<div class="category-section" id="${catId}" data-cat="${ci}">
      <div class="cat-header" onclick="toggleCat(${ci})">
        <span class="icon">${icon}</span>
        <h2>${escapeHtml(cat.name)}</h2>
        <span class="badge">${cat.topics.length}개 주제</span>
        <span class="chevron">▼</span>
      </div>
      <div class="cat-body" id="body-${ci}">`;

    cat.topics.forEach((topic, ti) => {
      const topicId = `topic-${ci}-${ti}`;
      mainHtml += `<div class="topic-card" id="${topicId}" data-search="${topic.name} ${topic.sections.map(s=>s.content.join(' ')).join(' ')}">
        <div class="topic-title" onclick="toggleTopic('${topicId}')">
          ${escapeHtml(topic.name)}
          <span class="t-chevron">▼</span>
        </div>
        <div class="topic-content" id="content-${topicId}">`;

      topic.sections.forEach(sec => {
        mainHtml += renderSection(sec);
      });

      mainHtml += '</div></div>';
    });

    mainHtml += '</div></div>';
  });

  document.getElementById('sidebar').innerHTML = sidebarHtml;
  document.getElementById('main').innerHTML = mainHtml;

  // Open first category
  toggleCat(0);
  toggleNav(0);
}

function toggleCat(ci) {
  const header = document.querySelector(`#cat-${ci} .cat-header`);
  const body = document.getElementById(`body-${ci}`);
  header.classList.toggle('open');
  body.classList.toggle('open');
}

function toggleNav(ci) {
  document.getElementById(`nav-${ci}`).classList.toggle('open');
}

function toggleTopic(id) {
  const title = document.querySelector(`#${id} .topic-title`);
  const content = document.getElementById(`content-${id}`);
  title.classList.toggle('open');
  content.classList.toggle('open');
}

function scrollToTopic(ci, ti) {
  const catBody = document.getElementById(`body-${ci}`);
  const catHeader = document.querySelector(`#cat-${ci} .cat-header`);
  if (!catBody.classList.contains('open')) {
    catHeader.classList.add('open');
    catBody.classList.add('open');
  }
  const topicEl = document.getElementById(`topic-${ci}-${ti}`);
  const title = topicEl.querySelector('.topic-title');
  const content = document.getElementById(`content-topic-${ci}-${ti}`);
  if (!content.classList.contains('open')) {
    title.classList.add('open');
    content.classList.add('open');
  }
  topicEl.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

// Search
let searchTimeout;
document.getElementById('searchInput').addEventListener('input', function(e) {
  clearTimeout(searchTimeout);
  searchTimeout = setTimeout(() => doSearch(e.target.value), 200);
});

function doSearch(query) {
  query = query.trim().toLowerCase();
  const cards = document.querySelectorAll('.topic-card');
  const cats = document.querySelectorAll('.category-section');

  if (!query) {
    cards.forEach(c => c.style.display = '');
    cats.forEach(c => c.style.display = '');
    // Remove highlights
    document.querySelectorAll('mark').forEach(m => {
      m.replaceWith(m.textContent);
    });
    return;
  }

  let anyVisible = false;
  cats.forEach(catEl => {
    const ci = catEl.dataset.cat;
    const body = document.getElementById(`body-${ci}`);
    const header = catEl.querySelector('.cat-header');
    let catHasMatch = false;

    catEl.querySelectorAll('.topic-card').forEach(card => {
      const searchText = card.dataset.search.toLowerCase();
      if (searchText.includes(query)) {
        card.style.display = '';
        catHasMatch = true;
        anyVisible = true;
        // Open card
        const title = card.querySelector('.topic-title');
        const content = card.querySelector('.topic-content');
        title.classList.add('open');
        content.classList.add('open');
      } else {
        card.style.display = 'none';
      }
    });

    if (catHasMatch) {
      catEl.style.display = '';
      header.classList.add('open');
      body.classList.add('open');
    } else {
      catEl.style.display = 'none';
    }
  });

  if (!anyVisible) {
    let noRes = document.getElementById('no-results');
    if (!noRes) {
      noRes = document.createElement('div');
      noRes.id = 'no-results';
      noRes.className = 'no-results';
      document.getElementById('main').appendChild(noRes);
    }
    noRes.style.display = '';
    noRes.innerHTML = `"${escapeHtml(query)}" 검색 결과가 없습니다.`;
  } else {
    const noRes = document.getElementById('no-results');
    if (noRes) noRes.style.display = 'none';
  }
}

buildPage();
</script>
</body>
</html>
